<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WatchParty by JAY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
  --bg:#080810; --surface:#111120; --surface2:#1a1a2e;
  --border:rgba(255,255,255,0.07); --text:#e8e8f0;
  --muted:rgba(255,255,255,0.35); --accent:#5b8def;
  --accent2:#7c5ce8; --green:#4ade80; --red:#ef4444;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100dvh;
  min-height:100dvh;
  overflow:hidden;
  -webkit-user-select:none; user-select:none;
}
h1,h2 { font-family:'Syne',sans-serif; }

button, input, input[type="range"], .video-wrap, video, iframe {
  touch-action: manipulation;
}

.screen { display:none; height:100dvh; flex-direction:column; overflow:hidden; }
.screen.active { display:flex; }

/* JOIN SCREEN */
#joinScreen {
  background:
    radial-gradient(ellipse at 30% 10%, rgba(91,141,239,.13) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(124,92,232,.10) 0%, transparent 50%),
    var(--bg);
  padding:48px 24px 32px; align-items:center;
  overflow-y:auto; gap:28px; overflow-x:hidden;
}
.brand { text-align:center; padding-top:8px; }
.brand-logo {
  width:56px; height:56px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:18px; display:flex; align-items:center; justify-content:center;
  font-size:26px; margin:0 auto 14px; box-shadow:0 8px 24px rgba(91,141,239,.3);
}
.brand h1 {
  font-size:26px; letter-spacing:-.5px;
  background:linear-gradient(135deg,#ffe9a8 10%,#d4af37 45%,#fff2c6 85%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.brand p { color:var(--muted); font-size:13px; margin-top:4px; }
.join-block { width:100%; max-width:380px; display:flex; flex-direction:column; gap:10px; }
.block-label { font-size:10px; font-weight:600; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; padding-left:2px; }
.field {
  width:100%; background:rgba(255,255,255,.05);
  border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px;
  outline:none; transition:border-color .2s,box-shadow .2s;
}
.field:focus { border-color:rgba(91,141,239,.5); box-shadow:0 0 0 3px rgba(91,141,239,.08); }
.field::placeholder { color:rgba(255,255,255,.2); }
.avatar-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
.av-opt {
  aspect-ratio:1; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:all .22s cubic-bezier(.34,1.56,.64,1);
  background:var(--surface2); padding:5px; overflow:hidden;
}
.av-opt img { width:100%; height:100%; border-radius:50%; display:block; }
.av-opt.sel { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,141,239,.25); transform:scale(1.08); }
.btn-primary {
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:14px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition:all .18s; box-shadow:0 6px 20px rgba(91,141,239,.25);
}
.btn-primary:active { transform:scale(.97); }
.divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.join-row { display:flex; gap:8px; }
.join-row .field {
  flex:1; font-family:'Space Mono',monospace;
  font-weight:700; font-size:16px; letter-spacing:.18em; text-transform:uppercase;
}
.btn-ghost {
  padding:14px 18px; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:14px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; white-space:nowrap; transition:all .18s;
}
.btn-ghost:active { transform:scale(.97); }

/* ROOM */
#roomScreen {
  position:relative;
  height:100dvh;
  min-height:100dvh;
  overflow-y:auto;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  overscroll-behavior:contain;
}

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  gap:10px;
  padding:clamp(8px, 1.4vw, 10px) clamp(10px, 2vw, 16px);
  background:rgba(8,8,16,.96);
  border-bottom:1px solid var(--border); flex-shrink:0;
  position:relative; z-index:4;
  min-width:0;
}
.room-pill { display:flex; align-items:center; gap:6px; min-width:0; }
.room-pill .label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.room-code-chip {
  font-family:'Space Mono',monospace;
  font-size:clamp(13px, 1.8vw, 16px); font-weight:700;
  color:#c8daff; letter-spacing:.10em;
  background:rgba(91,141,239,.13);
  border:1px solid rgba(91,141,239,.28);
  padding:clamp(4px, 0.8vw, 5px) clamp(10px, 1.8vw, 14px); border-radius:8px;
  cursor:pointer; user-select:text; -webkit-user-select:text;
  max-width:44vw;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.status { font-size:clamp(10px, 1.4vw, 11px); color:var(--muted); white-space:nowrap; }
.status .dot {
  display:inline-block; width:6px; height:6px;
  background:var(--green); border-radius:50%; margin-right:4px;
  animation:blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

.video-wrap {
  flex-shrink:0;
  height:clamp(160px, 38dvh, 420px);
  background:#000;
  position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  z-index:2;
  min-height:150px;
}
#mainVideo, #ytMount, #ttFrame {
  width:100%; height:100%;
  border:none; display:block;
}
#mainVideo {
  object-fit:contain;
  background:#000;
}
.video-empty {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; color:var(--muted); pointer-events:none; z-index:2;
}
.video-empty .big-icon { font-size:36px; }
.video-empty p { font-size:12px; }

.url-bar {
  position:absolute; top:8px; left:8px; right:8px;
  display:flex; gap:6px; z-index:10;
  min-width:0;
}
.url-bar input {
  flex:1; background:rgba(0,0,0,.75); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.13); border-radius:10px;
  padding:9px 12px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:12px; outline:none;
}
.url-bar input::placeholder { color:rgba(255,255,255,.3); }
.url-bar button {
  background:var(--accent); border:none; border-radius:10px;
  padding:9px 14px; color:#fff; font-family:'DM Sans',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;
}

.controls-panel {
  padding:clamp(8px, 1.8vw, 14px) clamp(10px, 1.8vw, 14px) clamp(8px, 1.4vw, 12px);
  background:var(--bg);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:clamp(8px, 1.5vw, 12px);
  z-index:3;
}
.control-row { display:flex; align-items:center; gap:clamp(8px, 1.4vw, 10px); width:100%; }
.ctrl-btn {
  flex:1;
  min-width:0;
  height:clamp(38px, 5.3vh, 46px);
  border-radius:14px;
  border:none;
  padding:0 clamp(8px, 1.6vw, 12px);
  display:flex; align-items:center; justify-content:center;
  gap:6px; cursor:pointer; transition:all .16s;
  color:#fff; font-family:'DM Sans',sans-serif; font-weight:600;
  background:rgba(255,255,255,.07);
  font-size:clamp(11px, 1.5vw, 15px);
}
.ctrl-btn:active { transform:scale(.95); }
.ctrl-btn.play { background:rgba(74,222,128,.16); color:#89f0a8; }
.ctrl-btn.pause { background:rgba(239,68,68,.16); color:#ff9e9e; }
.ctrl-btn.seek { background:rgba(91,141,239,.16); color:#c8daff; }
.ctrl-btn.cc { background:rgba(124,92,232,.18); color:#ddd2ff; }

.seek-wrap, .volume-wrap { display:flex; align-items:center; gap:clamp(8px, 1.4vw, 10px); width:100%; }
.seek-time { font-size:clamp(9px, 1.2vw, 10px); color:rgba(255,255,255,.55); white-space:nowrap; font-family:'Space Mono',monospace; }
.seekbar, .volume {
  width:100%; accent-color:var(--accent); height:4px;
}
.volume-label { font-size:clamp(10px, 1.3vw, 11px); color:var(--muted); min-width:42px; }

.caption-panel {
  margin:0 clamp(10px, 1.8vw, 14px) clamp(8px, 1.4vw, 12px);
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
  display:none;
  flex-direction:column;
  gap:10px;
  z-index:3;
}
.caption-panel.open { display:flex; }
.caption-head {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.caption-title {
  display:flex; flex-direction:column; gap:2px;
}
.caption-title strong {
  font-size:14px;
  font-family:'Syne',sans-serif;
}
.caption-title span {
  font-size:11px;
  color:var(--muted);
}
.caption-toggle {
  border:none;
  background:rgba(255,255,255,.08);
  color:var(--text);
  border-radius:999px;
  padding:9px 13px;
  font-weight:700;
  font-size:12px;
  cursor:pointer;
}
.caption-toggle.on {
  background:rgba(91,141,239,.18);
  color:#c8daff;
}
.caption-toggle.off {
  background:rgba(255,255,255,.08);
  color:var(--muted);
}
.caption-list {
  max-height:min(200px, 24dvh);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-right:2px;
}
.caption-list::-webkit-scrollbar { width:4px; }
.caption-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:4px; }
.caption-item {
  width:100%;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:var(--text);
  border-radius:14px;
  padding:11px 12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  text-align:left;
}
.caption-item:active { transform:scale(.99); }
.caption-item.active {
  border-color:rgba(91,141,239,.45);
  background:rgba(91,141,239,.14);
}
.caption-item .left {
  display:flex; flex-direction:column; gap:2px;
}
.caption-item .label {
  font-size:13px;
  font-weight:700;
}
.caption-item .meta {
  font-size:11px;
  color:var(--muted);
}
.caption-chip {
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.08em;
  border-radius:999px;
  padding:5px 8px;
  background:rgba(255,255,255,.07);
  color:var(--muted);
}
.caption-item.active .caption-chip {
  background:rgba(91,141,239,.22);
  color:#c8daff;
}

.info-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:clamp(7px, 1.2vw, 9px) clamp(10px, 1.8vw, 16px); background:rgba(8,8,16,.9);
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  flex-shrink:0;
  position:relative;
  z-index:3;
}
.watch-count { font-size:11px; color:var(--muted); }
.watch-count .dot {
  display:inline-block; width:6px; height:6px; background:var(--green);
  border-radius:50%; margin-right:4px; animation:blink 2s infinite;
}

/* BIGGER PARTICIPANTS AREA */
.participants-wrap {
  flex-shrink:0;
  background:var(--bg);
  padding:clamp(12px, 2vw, 24px) clamp(10px, 1.8vw, 14px) clamp(8px, 1.4vw, 12px);
  min-height:clamp(96px, 16dvh, 160px);
  overflow:visible;
  position:relative;
  z-index:3;
}
.participants-scroll {
  display:flex; gap:14px; align-items:flex-end;
  overflow-x:auto; overflow-y:visible;
  padding-bottom:6px;
}
.participants-scroll::-webkit-scrollbar { display:none; }

.p-item {
  display:flex; flex-direction:column; align-items:center;
  gap:6px; flex-shrink:0; position:relative;
}
.p-avatar-ring { position:relative; }
.p-avatar-ring img {
  border-radius:50%; border:2.5px solid transparent;
  background:var(--surface2); display:block;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}
.p-avatar-ring img.is-me { border-color:var(--accent); }
.online-pip {
  position:absolute; bottom:2px; right:2px;
  background:var(--green); border-radius:50%;
  border:2px solid var(--bg);
}
.p-name {
  font-size:10px; color:var(--muted);
  overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; text-align:center;
}

.chat-bubble {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px 12px 12px 3px;
  padding:6px 10px; font-size:11px; line-height:1.3;
  white-space:nowrap; max-width:180px;
  overflow:hidden; text-overflow:ellipsis;
  pointer-events:none; z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.55);
  color:var(--text);
  animation:bubPop .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
.chat-bubble::after {
  content:'';
  position:absolute;
  bottom:-7px; left:14px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid rgba(20,20,40,.97);
}
@keyframes bubPop {
  from { opacity:0; transform:translateX(-50%) scale(.8) translateY(6px); }
  to   { opacity:1; transform:translateX(-50%) scale(1)  translateY(0); }
}

.typing-bubble {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px 12px 12px 3px;
  padding:8px 12px;
  pointer-events:none; z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.55);
  display:flex; align-items:center; gap:4px;
  animation:bubPop .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
.typing-bubble::after {
  content:'';
  position:absolute;
  bottom:-7px; left:14px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid rgba(20,20,40,.97);
}
.tdot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,.6);
  animation:tdBounce 1.2s infinite ease-in-out;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdBounce {
  0%,60%,100%{transform:translateY(0);opacity:.5}
  30%{transform:translateY(-5px);opacity:1}
}

.controls-row {
  position:relative;
  display:flex; justify-content:center; align-items:center;
  gap:clamp(8px, 1.6vw, 12px); padding:clamp(8px, 1.4vw, 10px) clamp(10px, 1.8vw, 16px); background:var(--bg);
  border-top:1px solid var(--border); flex-shrink:0; flex-wrap:wrap;
  z-index:60;
}
.ctrl {
  width:clamp(38px, 5vw, 46px); height:clamp(38px, 5vw, 46px); border-radius:50%; border:none;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .18s; color:#fff;
}
.ctrl:active{transform:scale(.88)}
.ctrl.on    { background:rgba(91,141,239,.2); border:1px solid rgba(91,141,239,.3); color:var(--accent); }
.ctrl.off   { background:rgba(255,255,255,.07); color:var(--red); }
.ctrl.leave { background:var(--red); }

.chat-drawer {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(13,13,22,.98); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); border-radius:22px 22px 0 0;
  transition:height .4s cubic-bezier(.33,1,.68,1);
  height:56px; z-index:50; display:flex; flex-direction:column; overflow:hidden;
}
.chat-drawer.open { height:min(52dvh, 420px); }
.drawer-handle {
  height:56px; display:flex; align-items:center;
  padding:0 clamp(10px, 1.8vw, 16px); cursor:pointer; flex-shrink:0; position:relative;
}
.handle-pill {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  width:32px; height:3px; background:rgba(255,255,255,.18); border-radius:2px;
}
.handle-label {
  flex:1; min-width:0; font-size:13px; font-weight:500;
  color:rgba(255,255,255,.65); display:flex; align-items:center; gap:6px;
}
.online-badge {
  font-size:9px; background:rgba(91,141,239,.2);
  border:1px solid rgba(91,141,239,.3); color:var(--accent);
  padding:2px 7px; border-radius:8px;
}
.handle-chevron { color:var(--muted); transition:transform .4s; }
.chat-drawer.open .handle-chevron { transform:rotate(180deg); }
.msgs-list {
  flex:1; overflow-y:auto; padding:8px clamp(10px, 1.8vw, 14px);
  display:flex; flex-direction:column; gap:10px;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.chat-drawer.open .msgs-list { opacity:1; pointer-events:auto; }
.msgs-list::-webkit-scrollbar{width:3px}
.msgs-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.msg-row { display:flex; gap:8px; align-items:flex-end; }
.msg-row.me { flex-direction:row-reverse; }
.msg-av { width:26px; height:26px; border-radius:50%; background:var(--surface2); flex-shrink:0; }
.msg-body { display:flex; flex-direction:column; gap:2px; max-width:70%; }
.msg-sender { font-size:9px; color:var(--muted); padding:0 4px; }
.msg-row.me .msg-sender { text-align:right; }
.msg-text {
  background:var(--surface2); padding:9px 12px;
  border-radius:14px 14px 14px 3px;
  font-size:13px; line-height:1.4; word-break:break-word; color:var(--text);
}
.msg-row.me .msg-text {
  background:var(--accent); border-radius:14px 14px 3px 14px; color:#fff;
}
.chat-input-row {
  padding:10px clamp(10px, 1.8vw, 14px); padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex; gap:8px; align-items:center;
  border-top:1px solid var(--border); flex-shrink:0;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.chat-drawer.open .chat-input-row { opacity:1; pointer-events:auto; }
.chat-field {
  flex:1; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:22px;
  padding:10px 16px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none;
}
.chat-field::placeholder { color:rgba(255,255,255,.2); }
.chat-field:focus { border-color:rgba(91,141,239,.35); }
.send-btn {
  width:36px; height:36px; background:var(--accent); border:none;
  border-radius:50%; color:#fff; display:flex;
  align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all .15s;
}
.send-btn:active{transform:scale(.88)}

.toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(26,26,46,.95); border:1px solid var(--border);
  padding:10px 18px; border-radius:12px; font-size:13px;
  z-index:9999; pointer-events:none; opacity:0;
  transition:opacity .25s,transform .25s; white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.hidden { display:none !important; }

/* ON-SCREEN CHAT BUBBLE OVERLAY */
#floatingBubbles {
  position:absolute;
  left:0; right:0; top:0; bottom:0;
  z-index:6;
  pointer-events:none;
  display:flex;
  flex-direction:column-reverse;
  justify-content:flex-start;
  align-items:flex-start;
  gap:8px;
  padding:0 16px 210px 16px;
  overflow:hidden;
}
.float-bubble {
  max-width:min(86%, 420px);
  background:rgba(10,10,18,.88);
  border:1px solid rgba(255,255,255,.12);

function normalizeCaptionTrack(track, idx){
  const label = track?.label || track?.name || track?.language || track?.lang || `Track ${idx + 1}`;
  const lang = track?.lang || track?.language || track?.languageCode || track?.srclang || track?.label || '';
  return {
    index: typeof track?.index === 'number' ? track.index : idx,
    label,
    lang: lang || '',
    kind: track?.kind || track?.type || 'subtitle'
  };
}

function dedupeCaptionTracks(tracks){
  const seen = new Set();
  return tracks.filter((track, idx) => {
    const key = `${(track.label || '').toLowerCase()}|${(track.lang || '').toLowerCase()}|${(track.kind || '').toLowerCase()}`;
    if(seen.has(key)) return false;
    seen.add(key);
    track.index = idx;

  });

function setVisiblePlayer(type){
  const v = document.getElementById('mainVideo');

  document.getElementById('videoEmpty').classList.toggle('hidden', type !== 'none');
}

function parseVideoInput(raw){
  const url = raw.trim();
  if(!/^https?:\/\//i.test(url)) return null;

  const ytId = extractYouTubeId(url);
  if(ytId) return { type:'youtube', url, videoId:ytId, startAt:extractYouTubeStart(url) || 0 };

  const ttId = extractTikTokId(url);
  if(ttId) return { type:'tiktok', url, videoId:ttId, startAt:0 };

  const igInfo = extractInstagramInfo(url);
  if(igInfo.id) return { type:'instagram', url, videoId:igInfo.id, socialKind:igInfo.kind, startAt:0 };

  return { type:'direct', url, videoId:'', startAt:0 };
}

function extractYouTubeId(url){
  const patterns = [
    /youtu\.be\/([A-Za-z0-9_-]{11})/i,
    /youtube\.com\/watch\?v=([A-Za-z0-9_-]{11})/i,
    /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/i,
    /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/i
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m) return m[1];
  }
  return '';
}
function extractYouTubeStart(url){
  const m = url.match(/[?&]t=(\d+)/i);
  return m ? Number(m[1]) : 0;
}
function extractTikTokId(url){
  const m1 = url.match(/tiktok\.com\/@[^/]+\/video\/(\d+)/i);
  if(m1) return m1[1];
  const m2 = url.match(/tiktok\.com\/player\/v1\/(\d+)/i);
  if(m2) return m2[1];
  return '';
}

function extractInstagramInfo(url){
  const patterns = [
    { kind:'reel', re:/instagram\.com\/reel\/([A-Za-z0-9._-]+)/i },
    { kind:'p', re:/instagram\.com\/p\/([A-Za-z0-9._-]+)/i },
    { kind:'tv', re:/instagram\.com\/tv\/([A-Za-z0-9._-]+)/i }
  ];
  for(const p of patterns){
    const m = url.match(p.re);
    if(m) return { kind:p.kind, id:m[1] };
  }
  return { kind:'reel', id:'' };
}

function getDuration(){
  if(currentType === 'direct'){
    const v = videoEl();
    return v.duration && isFinite(v.duration) ? v.duration : 0;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    const d = ytPlayer.getDuration?.();
    return isFinite(d) ? d : 0;
  }
  if(currentType === 'tiktok' || currentType === 'instagram'){
    return isFinite(ttDuration) ? ttDuration : 0;
  }
  return 0;
}
function getCurrentTime(){
  if(currentType === 'direct'){
    return videoEl().currentTime || 0;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    return ytPlayer.getCurrentTime?.() || 0;
  }
  if(currentType === 'tiktok' || currentType === 'instagram'){
    return ttCurrentTime || 0;
  }
  return 0;
}
function isPlaying(){
  if(currentType === 'direct'){
    return !videoEl().paused;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    return ytPlayer.getPlayerState?.() === YT.PlayerState.PLAYING;
  }
  if(currentType === 'tiktok' || currentType === 'instagram'){
    return currentState?.playing === true;
  }
  return false;
}
function getVolume(){
  if(currentType === 'direct'){
    return videoEl().volume ?? 1;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    return (ytPlayer.getVolume?.() ?? 100) / 100;
  }
  if(currentType === 'tiktok' || currentType === 'instagram'){
    return ttMuted ? 0 : (currentState?.volume ?? 1);
  }
  return 1;
}
function getLiveTargetTime(state){
  if(!state) return 0;
  const base = Number(state.currentTime || 0);
  if(!state.playing) return base;
  const ts = Number(state.updatedAt || 0);
  if(!ts) return base;
  return Math.max(0, base + ((serverNow() - ts) / 1000));
}

function sameMeaningfulState(a, b){
  if(!a || !b) return false;
  return a.type === b.type &&
    a.url === b.url &&
    a.videoId === b.videoId &&
    (a.socialKind || 'reel') === (b.socialKind || 'reel') &&
    a.playing === b.playing &&
    Math.abs(Number(a.currentTime || 0) - Number(b.currentTime || 0)) < 0.35 &&
    Math.abs(Number(a.volume || 1) - Number(b.volume || 1)) < 0.01;
}

function pushRoomState(patch, force = false){
  if(!refs.player) return;

  const next = {
    ...(currentState || {}),
    ...patch
  };

  if(!force && sameMeaningfulState(next, currentState)) return;

  const now = serverNow();
  if(!force && now - lastBroadcastAt < 150) return;
  lastBroadcastAt = now;

  next.by = me.id;
  next.updatedAt = now;

  currentState = next;
  refs.player.update(next);
}

function syncUiFromPlayer(){
  const seek = document.getElementById('seekBar');
  const cur = document.getElementById('currentTimeLabel');
  const dur = document.getElementById('durationLabel');
  const d = getDuration();
  const c = getCurrentTime();

  if(d > 0){
    seek.value = String(Math.round((c / d) * 1000));
    cur.textContent = fmt(c);
    dur.textContent = fmt(d);
  } else {
    seek.value = '0';
    cur.textContent = fmt(c);
    dur.textContent = '0:00';
  }

  document.getElementById('volumeBar').value = String(Math.round(getVolume() * 100));
}

function ensureYouTubeApi(){
  if(window.YT?.Player) return Promise.resolve();
  if(ytApiPromise) return ytApiPromise;

  ytApiPromise = new Promise(resolve=>{
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = function(){
      if(typeof prev === 'function') prev();
      resolve();
    };
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  });

  return ytApiPromise;
}

function createOrResetYT(videoId, startAt = 0, autoplay = false, captionOn = captionEnabled, preferredCaptionLang = null){
  ensureYouTubeApi().then(()=>{
    setVisiblePlayer('youtube');
    document.getElementById('videoEmpty').classList.add('hidden');

    if(!ytPlayer){
      ytPlayer = new YT.Player('ytMount', {
        width:'100%',
        height:'100%',
        videoId,
        playerVars:{
          autoplay:0,
          controls:0,
          rel:0,
          modestbranding:1,
          playsinline:1,
          disablekb:1,
          iv_load_policy:3,
          cc_load_policy:captionOn ? 1 : 0,
          cc_lang_pref:preferredCaptionLang || getPreferredCaptionLang(),
          hl:(navigator.language || 'en').slice(0,2),
          origin:location.origin,
          enablejsapi:1
        },
        events:{
          onReady:()=>{
            ytReady = true;
            refreshCaptionStateFromCurrentSource();
            if(pendingYTApply){
              const s = pendingYTApply;
              pendingYTApply = null;
              applyYTState(s);
            } else if(autoplay){
              ytPlayer.seekTo(startAt || 0, true);
              ytPlayer.playVideo();
            }
            syncUiFromPlayer();
          },
          onApiChange:()=>{
            refreshCaptionStateFromCurrentSource();
          },
          onStateChange:(e)=>{
            if(isApplyingRemote) return;
            if(e.data === YT.PlayerState.PLAYING ||
               e.data === YT.PlayerState.PAUSED ||
               e.data === YT.PlayerState.ENDED){
              pushStateFromLocal(true);
            }
          }
        }
      });
      return;
    }

    if(ytReady){
      if(currentVideoId !== videoId){
        ytPlayer.loadVideoById({ videoId, startSeconds:startAt || 0 });
      } else {
        ytPlayer.seekTo(startAt || 0, true);
      }
      if(!autoplay) ytPlayer.pauseVideo();
    } else {
      pendingYTApply = { videoId, startAt, autoplay };
    }
  });
}

function applyYTState(state){
  if(!ytPlayer || !ytReady){
    pendingYTApply = state;
    return;
  }

  const target = getLiveTargetTime(state);

  if(state.videoId && state.videoId !== currentVideoId){
    ytPlayer.loadVideoById({ videoId:state.videoId, startSeconds:target || 0 });
  } else {
    const current = ytPlayer.getCurrentTime?.() || 0;
    if(Math.abs(current - target) > SYNC_TOLERANCE_SECONDS){
      ytPlayer.seekTo(target || 0, true);
    }
  }

  if(typeof state.volume === 'number'){
    const vol = Math.max(0, Math.min(100, Math.round(state.volume * 100)));
    ytPlayer.setVolume(vol);
    if(vol === 0) ytPlayer.mute(); else ytPlayer.unMute();
  }

  syncYouTubeCaptions(true);

  if(state.playing) ytPlayer.playVideo();
  else ytPlayer.pauseVideo();
}

function syncYouTubeCaptions(silent = false){
  if(currentType !== 'youtube' || !ytPlayer || !ytReady) return;
  refreshCaptionStateFromCurrentSource();
  try {
    const modules = ytPlayer.getOptions?.();
    const moduleAvailable = Array.isArray(modules) && modules.includes('captions');
    if(moduleAvailable){
      const options = ytPlayer.getOptions('captions') || [];
      if(options.includes('fontSize')) ytPlayer.setOption('captions', 'fontSize', 0);
      if(options.includes('reload')) ytPlayer.setOption('captions', 'reload', true);
    }
  } catch(_) {}

  if(captionEnabled && captionTracks.length){
    const lang = (captionTracks.find(t => t.index === selectedCaptionIndex) || captionTracks[0] || {}).lang || getPreferredCaptionLang();
    try {
      ytPlayer.loadModule?.('captions');
    } catch(_) {}
    if(lang){
      try { ytPlayer.setOption('captions', 'cc_lang_pref', lang); } catch(_) {}
    }
  }

  if(!silent){
    toast(captionEnabled ? 'Captions on' : 'Captions off');
  }
}

function ttPost(type, value = null){
  const f = document.getElementById('ttFrame');
  if(!f?.contentWindow) return;
  f.contentWindow.postMessage({ type, value, 'x-tiktok-player': true }, '*');
}
function applyTikTokState(state){
  const target = getLiveTargetTime(state);
  if(state.videoId && state.videoId !== currentVideoId){
    loadTikTokFrame(state.videoId, state.playing);
  }

  if(state.playing) ttPost('play');
  else ttPost('pause');

  ttPost('seekTo', target || 0);

  if(state.volume != null){
    if(state.volume <= 0) ttPost('mute');
    else ttPost('unMute');
  }
}

window.addEventListener('message', (event) => {
  const d = event.data;
  if(!d || d['x-tiktok-player'] !== true) return;

  if(d.type === 'onCurrentTime'){
    ttCurrentTime = Number(d.currentTime || 0);
    ttDuration = Number(d.duration || 0);
    syncUiFromPlayer();
  }

  if(d.type === 'onMute'){
    ttMuted = !!d.value;
    syncUiFromPlayer();
  }

  if(d.type === 'onVolumeChange'){
    ttMuted = Number(d.value) === 0;
    syncUiFromPlayer();
  }

  if(d.type === 'onStateChange' && !isApplyingRemote){
    pushStateFromLocal(true);
  }

  if(d.type === 'onPlayerError'){
    toast('TikTok player error.');
  }
});

function resetCaptionUI(){
  captionTracks = [];
  selectedCaptionIndex = -1;
  lastCaptionIndex = -1;
  captionEnabled = false;
  captionSource = 'none';
  ytCaptionModuleReady = false;
  renderCaptionPanel();
}

function trackLabel(track, idx){
  const parts = [];
  if(track.label) parts.push(track.label);
  if(track.name && track.name !== track.label) parts.push(track.name);
  if(track.lang && !parts.includes(track.lang)) parts.push(track.lang);
  if(!parts.length) parts.push(`Track ${idx + 1}`);
  return parts.join(' • ');
}

function renderCaptionPanel(){
  const panel = document.getElementById('captionPanel');
  const list = document.getElementById('captionList');
  const toggleBtn = document.getElementById('captionToggleBtn');
  const status = document.getElementById('captionStatusText');

  panel.classList.toggle('open', captionPanelOpen);

  if(!list || !toggleBtn || !status) return;

  if(currentType === 'youtube'){
    const tracks = captionTracks.length ? captionTracks : captureYouTubeCaptionTracks();
    const active = tracks.find(t => t.index === selectedCaptionIndex) || tracks[0] || null;

    list.innerHTML = '';
    const offBtn = document.createElement('button');
    offBtn.className = `caption-item ${!captionEnabled ? 'active' : ''}`;
    offBtn.innerHTML = `
      <div class="left">
        <div class="label">Off</div>
        <div class="meta">Disable captions</div>
      </div>
      <div class="caption-chip">No CC</div>
    `;
    offBtn.onclick = ()=>toggleCaptionsEnabled();
    list.appendChild(offBtn);

    tracks.forEach((track, idx)=>{
      const item = document.createElement('button');
      const isActive = captionEnabled && active && active.index === track.index;
      item.className = `caption-item ${isActive ? 'active' : ''}`;
      item.innerHTML = `
        <div class="left">
          <div class="label">${esc(track.label || `Track ${idx + 1}`)}</div>
          <div class="meta">${esc(track.lang ? `Language: ${track.lang}` : 'Language not exposed by player')}</div>
        </div>
        <div class="caption-chip">${isActive ? 'On' : 'Select'}</div>
      `;
      item.onclick = ()=>selectCaptionTrack(track.index);
      list.appendChild(item);
    });

    toggleBtn.textContent = captionEnabled ? 'On' : 'Off';
    toggleBtn.className = `caption-toggle ${captionEnabled ? 'on' : 'off'}`;
    status.textContent = captionEnabled
      ? `Showing ${active ? (active.label || 'captions') : 'captions'}`
      : 'Choose a caption language or turn captions on';
    return;
  }

  if(currentType === 'tiktok' || currentType === 'instagram'){
    list.innerHTML = `<div style="padding:10px 2px;color:var(--muted);font-size:12px;line-height:1.4;">${currentType === 'tiktok' ? 'TikTok' : 'Instagram'} embeds do not expose caption tracks to this page. Use the platform player captions if the post provides them.</div>`;
    toggleBtn.textContent = 'Off';
    toggleBtn.className = 'caption-toggle off';
    status.textContent = 'Captions are not exposed by this embed';
    return;
  }

  if(!currentUrl || currentType !== 'direct'){
    list.innerHTML = `<div style="padding:10px 2px;color:var(--muted);font-size:12px;line-height:1.4;">Captions are available for direct streams when the video provides subtitle tracks.</div>`;
    toggleBtn.textContent = 'Off';
    toggleBtn.className = 'caption-toggle off';
    status.textContent = 'Captions are not available for this source';
    return;
  }

  if(!captionTracks.length){
    list.innerHTML = `<div style="padding:10px 2px;color:var(--muted);font-size:12px;line-height:1.4;">No caption tracks were detected in this video.</div>`;
    toggleBtn.textContent = 'Off';
    toggleBtn.className = 'caption-toggle off';
    status.textContent = 'No caption tracks found';
    return;
  }

  toggleBtn.textContent = captionEnabled ? 'On' : 'Off';
  toggleBtn.className = `caption-toggle ${captionEnabled ? 'on' : 'off'}`;
  status.textContent = captionEnabled
    ? `Showing ${trackLabel(captionTracks.find(t => t.index === selectedCaptionIndex) || captionTracks[0], selectedCaptionIndex >= 0 ? selectedCaptionIndex : 0)}`
    : `Choose a language or turn captions on`;

  list.innerHTML = '';

  const offBtn = document.createElement('button');
  offBtn.className = `caption-item ${!captionEnabled ? 'active' : ''}`;
  offBtn.innerHTML = `
    <div class="left">
      <div class="label">Off</div>
      <div class="meta">Disable captions</div>
    </div>
    <div class="caption-chip">No CC</div>
  `;
  offBtn.onclick = ()=>selectCaptionTrack(-1);
  list.appendChild(offBtn);

  captionTracks.forEach((track, idx)=>{
    const item = document.createElement('button');
    const active = captionEnabled && selectedCaptionIndex === track.index;
    item.className = `caption-item ${active ? 'active' : ''}`;
    item.innerHTML = `
      <div class="left">
        <div class="label">${esc(trackLabel(track, idx))}</div>
        <div class="meta">${esc(track.kind || 'subtitle')} track</div>
      </div>
      <div class="caption-chip">${active ? 'On' : 'Select'}</div>
    `;
    item.onclick = ()=>selectCaptionTrack(track.index);
    list.appendChild(item);
  });
}

function syncCaptionTracksFromSource(){
  if(currentType === 'youtube'){
    refreshCaptionStateFromCurrentSource();
    return;
  }

  if(currentType === 'tiktok' || currentType === 'instagram'){
    captionTracks = [];
    captionSource = currentType;
    renderCaptionPanel();
    return;
  }

  if(currentType !== 'direct' || !currentUrl){
    resetCaptionUI();
    return;
  }

  const v = videoEl();
  if(!v) return;

  const hasNativeHls = !!v.canPlayType('application/vnd.apple.mpegurl');
  const looksLikeM3U8 = /\.m3u8(\?|#|$)/i.test(currentUrl);

  if(hlsInstance && looksLikeM3U8){
    const tracks = Array.isArray(hlsInstance.subtitleTracks) ? hlsInstance.subtitleTracks : [];
    captionSource = 'hls';
    captionTracks = tracks.map((track, idx) => ({
      index: idx,
      label: track.name || track.label || `Track ${idx + 1}`,
      lang: track.lang || track.language || '',
      kind: track.type || 'subtitle'
    }));
  } else if(hasNativeHls || v.textTracks){
    const tracks = Array.from(v.textTracks || []);
    captionSource = 'native';
    captionTracks = tracks.map((track, idx) => ({
      index: idx,
      label: track.label || `Track ${idx + 1}`,
      lang: track.language || '',
      kind: track.kind || 'subtitles'
    }));
  } else {
    captionTracks = [];
    captionSource = 'none';
  }

  if(!captionTracks.length){
    captionEnabled = false;
    selectedCaptionIndex = -1;
  } else if(selectedCaptionIndex >= captionTracks.length && captionSource === 'hls'){
    selectedCaptionIndex = -1;
    captionEnabled = false;
  }

  renderCaptionPanel();
  applyCaptionSelectionToSource(captionEnabled ? selectedCaptionIndex : -1, true);
}

function applyCaptionSelectionToSource(index, silent = false){
  if(currentType !== 'direct') return;
  const v = videoEl();
  if(!v) return;

  const looksLikeM3U8 = /\.m3u8(\?|#|$)/i.test(currentUrl);
  const enable = index >= 0;

  selectedCaptionIndex = index;
  captionEnabled = enable;
  if(enable) lastCaptionIndex = index;

  if(hlsInstance && looksLikeM3U8 && captionSource === 'hls'){
    try { hlsInstance.subtitleTrack = enable ? index : -1; } catch(_) {}
  } else {
    const tracks = Array.from(v.textTracks || []);
    tracks.forEach((track, i)=>{
      track.mode = enable && i === index ? 'showing' : 'disabled';
    });
  }

  renderCaptionPanel();
  if(!silent) toast(enable ? 'Captions enabled' : 'Captions disabled');
}

function selectCaptionTrack(index){
  if(currentType === 'youtube'){
    if(index < 0){
      setYouTubeCaptionsEnabled(false);
      return;
    }
    const track = captionTracks.find(t => t.index === index) || captionTracks[index] || null;
    if(!track){
      toast('No captions available in this video.');
      return;
    }
    selectedCaptionIndex = track.index;
    lastCaptionIndex = track.index;
    setYouTubeCaptionsEnabled(true, track.index);
    return;
  }

  if(currentType === 'tiktok' || currentType === 'instagram'){
    toast('This embed does not expose caption tracks.');
    return;
  }

  if(index < 0){
    applyCaptionSelectionToSource(-1);
    return;
  }
  if(!captionTracks.length){
    toast('No captions available in this video.');
    return;
  }
  applyCaptionSelectionToSource(index);
}

function toggleCaptionsEnabled(){
  if(currentType === 'youtube'){
    setYouTubeCaptionsEnabled(!captionEnabled, captionEnabled ? selectedCaptionIndex : (lastCaptionIndex >= 0 ? lastCaptionIndex : 0));
    return;
  }

  if(currentType === 'tiktok' || currentType === 'instagram'){
    toast('This embed does not expose caption tracks.');
    return;
  }

  if(!captionTracks.length){
    toast('No captions available in this video.');
    return;
  }
  if(captionEnabled){
    applyCaptionSelectionToSource(-1);
    return;
  }
  const restore = captionTracks.find(t => t.index === lastCaptionIndex) || captionTracks[0];
  applyCaptionSelectionToSource(restore.index);
}

function toggleCaptionsPanel(){
  captionPanelOpen = !captionPanelOpen;
  renderCaptionPanel();
}

function loadDirectVideo(url, startAt = 0, autoplay = false){
  const v = videoEl();
  setVisiblePlayer('direct');
  document.getElementById('videoEmpty').classList.add('hidden');

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }

  resetCaptionUI();

  if(v.canPlayType('application/vnd.apple.mpegurl') && /\.m3u8(\?|#|$)/i.test(url)){
    v.src = url;
    v.onloadedmetadata = () => {
      try { if(isFinite(startAt) && startAt > 0) v.currentTime = Math.max(0, startAt); } catch(_) {}
      if(autoplay) v.play().catch(()=>{});
      syncCaptionTracksFromSource();
      syncUiFromPlayer();
    };
    v.onloadeddata = () => {
      syncCaptionTracksFromSource();
    };
  } else if(/\.m3u8(\?|#|$)/i.test(url) && window.Hls && Hls.isSupported()){
    hlsInstance = new Hls({
      enableWorker:true,
      lowLatencyMode:true,
      subtitleDisplay:true
    });

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
      try { if(isFinite(startAt) && startAt > 0) v.currentTime = Math.max(0, startAt); } catch(_) {}
      if(autoplay) v.play().catch(()=>{});
      captionTracks = Array.isArray(data?.subtitleTracks) ? data.subtitleTracks.map((track, idx) => ({
        index: idx,
        label: track.name || track.label || `Track ${idx + 1}`,
        lang: track.lang || track.language || '',
        kind: track.type || 'subtitle'
      })) : [];
      captionSource = 'hls';
      renderCaptionPanel();
      applyCaptionSelectionToSource(captionEnabled ? selectedCaptionIndex : -1, true);
      syncUiFromPlayer();
    });

    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
      if(data?.fatal){
        toast('HLS playback error. The stream may block cross-origin playback.');
      }
    });

    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
  } else {
    if(v.src !== url){
      v.src = url;
      v.load();
    }

    v.onloadedmetadata = () => {
      try { if(isFinite(startAt) && startAt > 0) v.currentTime = Math.max(0, startAt); } catch(_) {}
      if(autoplay) v.play().catch(()=>{});
      syncCaptionTracksFromSource();
      syncUiFromPlayer();
    };
  }
}

  if(!validateJoin()) return;
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();

function avatarSz(n){
  if(n<=1)  return 132;
  if(n===2) return 118;
  if(n<=4)  return 104;
  if(n<=6)  return 92;
  if(n<=9)  return 80;
  if(n<=12) return 68;
  if(n<=16) return 58;
  return 48;
}

function renderParts(){

  const n = Object.keys(parts).length;
  const sz = avatarSz(n);
  const pip = Math.max(8, Math.round(sz * 0.17));

  const savedBubble = {};
  const savedTyping = {};

  list.querySelectorAll('.p-item').forEach(el=>{
    const uid = el.id.replace('pi-','');
    const cb = el.querySelector('.chat-bubble');
    const tb = el.querySelector('.typing-bubble');

    const isMe = uid === me.id;

function mkTypingBubble(){

function listenTyping(){

function pushScreenBubble(m){
  const log = document.getElementById('floatingBubbles');
  if(!log) return;

  const el = document.createElement('div');
  el.className = 'float-bubble';
  el.innerHTML = `
    <div class="fb-name">${esc(m.name)}</div>
    <div class="fb-text">${esc(m.text)}</div>
  `;
  log.appendChild(el);

  while(log.children.length > 4){
    log.removeChild(log.firstElementChild);
  }

  setTimeout(()=>{
    el.style.transition = 'opacity .45s ease, transform .45s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px) scale(.98)';
    setTimeout(()=>el.remove(), 460);
  }, 5000);
}

  if(!refs.myTyping) return;
  if(this.value.trim().length > 0){
    if(!isTyping) setTyping(true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>setTyping(false), 3000);
  } else {
    clearTimeout(typingTimer);
    setTyping(false);
  }
});
document.getElementById('chatField').addEventListener('keypress', e=>{ if(e.key==='Enter') sendMsg(); });

/* PLAYER STATE */
function loadStateIntoUI(state){
  if(!state || !state.type) return;

  currentType = state.type;
  currentUrl = state.url || '';
  currentVideoId = state.videoId || '';
  currentState = state;

  document.getElementById('videoUrlInput').value = state.url || '';
  document.getElementById('syncStateLabel').textContent = `${state.type.toUpperCase()} ${state.playing ? 'Playing' : 'Paused'}`;

  if(state.type === 'direct'){
    setVisiblePlayer('direct');
    if(state.url !== videoEl().src){
      loadDirectVideo(state.url, getLiveTargetTime(state), !!state.playing);
    } else {
      const v = videoEl();
      if(typeof state.volume === 'number') v.volume = Math.max(0, Math.min(1, state.volume));
      const target = getLiveTargetTime(state);
      if(Math.abs((v.currentTime || 0) - target) > SYNC_TOLERANCE_SECONDS){
        try { v.currentTime = target; } catch(_) {}
      }
      if(state.playing && v.paused) v.play().catch(()=>{});
      if(!state.playing && !v.paused) v.pause();
      syncCaptionTracksFromSource();
      syncUiFromPlayer();
    }
  }

  if(state.type === 'youtube'){
    if(!ytPlayer || !ytReady || currentVideoId !== state.videoId){
      createOrResetYT(state.videoId, getLiveTargetTime(state), !!state.playing, captionEnabled, getPreferredCaptionLang());
      pendingYTApply = state;
    } else {
      applyYTState(state);
    }
    setVisiblePlayer('youtube');
    syncYouTubeCaptions(true);
    syncUiFromPlayer();
  }

  if(state.type === 'tiktok'){
    if(currentVideoId !== state.videoId){
      loadTikTokFrame(state.videoId, !!state.playing);
      pendingTTApply = state;
    } else {
      applyTikTokState(state);
    }
    setVisiblePlayer('tiktok');
    resetCaptionUI();
    syncUiFromPlayer();
  }

  if(state.type === 'instagram'){
    currentSocialKind = state.socialKind || 'reel';
    loadInstagramFrame(state.videoId, currentSocialKind);
    setVisiblePlayer('instagram');
    resetCaptionUI();
    syncUiFromPlayer();
  }
}

function listenPlayer(){
  refs.player.on('value', snap=>{
    const state = snap.val();
    if(!state || !state.type){
      document.getElementById('syncStateLabel').textContent = 'Ready';
      return;
    }

    if(!stateReady){
      stateReady = true;
      currentState = state;
      loadStateIntoUI(state);
      return;
    }

    if(state.by === me.id && state.type === currentType){
      currentState = state;
      syncUiFromPlayer();
      return;
    }

    isApplyingRemote = true;
    currentState = state;
    loadStateIntoUI(state);
    setTimeout(()=>{ isApplyingRemote = false; }, 250);
  });
}

function pushStateFromLocal(force = false){
  if(!refs.player) return;
  const patch = {
    type: currentType,
    url: currentUrl,
    videoId: currentVideoId,
    socialKind: currentSocialKind,
    playing: isPlaying(),
    currentTime: getCurrentTime(),
    volume: getVolume()
  };
  pushRoomState(patch, force);
}

function startSyncLoop(){
  clearInterval(syncTimer);
  syncTimer = setInterval(()=>{
    if(!currentState) return;
    syncUiFromPlayer();

    const expected = getLiveTargetTime(currentState);
    const d = getDuration();

    if(currentState.playing && d > 0){
      if(currentType === 'direct'){
        const v = videoEl();
        if(v.src && !v.paused && Math.abs((v.currentTime || 0) - expected) > SYNC_TOLERANCE_SECONDS){
          isApplyingRemote = true;
          try { v.currentTime = expected; } catch(_) {}
          setTimeout(()=>{ isApplyingRemote = false; }, 200);
        }
      }

      if(currentType === 'youtube' && ytPlayer && ytReady){
        const c = ytPlayer.getCurrentTime?.() || 0;
        if(Math.abs(c - expected) > SYNC_TOLERANCE_SECONDS){
          ytPlayer.seekTo(expected, true);
        }
      }

      if(currentType === 'tiktok'){
        if(Math.abs(ttCurrentTime - expected) > SYNC_TOLERANCE_SECONDS){
          ttPost('seekTo', expected);
        }
      }
    }
  }, 1000);
}

/* DIRECT VIDEO EVENTS */
const directVideo = document.getElementById('mainVideo');
directVideo.addEventListener('loadedmetadata', ()=>{ if(currentType==='direct') { syncCaptionTracksFromSource(); syncUiFromPlayer(); } });
directVideo.addEventListener('durationchange', ()=>{ if(currentType==='direct') syncUiFromPlayer(); });
directVideo.addEventListener('timeupdate', ()=>{ if(currentType==='direct' && !localSeekDrag) syncUiFromPlayer(); });
directVideo.addEventListener('volumechange', ()=>{ if(currentType==='direct') syncUiFromPlayer(); });
directVideo.addEventListener('play', ()=>{ if(!isApplyingRemote && currentType==='direct') pushStateFromLocal(true); });
directVideo.addEventListener('pause', ()=>{ if(!isApplyingRemote && currentType==='direct') pushStateFromLocal(true); });
directVideo.addEventListener('seeked', ()=>{ if(!isApplyingRemote && currentType==='direct') pushStateFromLocal(true); });

/* CONTROLS */
function loadVideo(){
  const raw = document.getElementById('videoUrlInput').value.trim();
  if(!raw){ toast('Paste a video link first.'); return; }

  const parsed = parseVideoInput(raw);
  if(!parsed){ toast('Paste a valid link starting with https://'); return; }

  currentType = parsed.type;
  currentUrl = parsed.url;
  currentVideoId = parsed.videoId || '';

  document.getElementById('videoEmpty').classList.add('hidden');
  document.getElementById('syncStateLabel').textContent = `${parsed.type.toUpperCase()} Loading`;

  if(parsed.type === 'direct'){
    loadDirectVideo(parsed.url, 0, true);
  } else if(parsed.type === 'youtube'){
    resetCaptionUI();
    createOrResetYT(parsed.videoId, parsed.startAt || 0, true, true, getPreferredCaptionLang());
  } else if(parsed.type === 'tiktok'){
    resetCaptionUI();
    loadTikTokFrame(parsed.videoId, true);
  } else if(parsed.type === 'instagram'){
    resetCaptionUI();
    currentSocialKind = parsed.socialKind || 'reel';
    loadInstagramFrame(parsed.videoId, currentSocialKind);
  }

  currentState = {
    type: parsed.type,
    url: parsed.url,
    videoId: parsed.videoId || '',
    socialKind: parsed.socialKind || currentSocialKind || 'reel',
    playing: parsed.type === 'direct' || parsed.type === 'youtube' || parsed.type === 'tiktok',
    currentTime: 0,
    volume: Number(document.getElementById('volumeBar').value) / 100,
    updatedAt: serverNow(),
    by: me.id
  };

  pushRoomState(currentState, true);
  syncUiFromPlayer();
}

function playVideo(){
  if(!currentUrl){ toast('Load a video first.'); return; }

  if(currentType === 'direct') videoEl().play().catch(()=>{});
  if(currentType === 'youtube' && ytPlayer && ytReady) ytPlayer.playVideo();
  if(currentType === 'tiktok') ttPost('play');
  if(currentType === 'instagram') toast('Instagram embeds do not support remote play controls.');

  pushStateFromLocal(true);
  document.getElementById('syncStateLabel').textContent = `${currentType.toUpperCase()} Playing`;
}

function pauseVideo(){
  if(!currentUrl){ toast('Load a video first.'); return; }

  if(currentType === 'direct') videoEl().pause();
  if(currentType === 'youtube' && ytPlayer && ytReady) ytPlayer.pauseVideo();
  if(currentType === 'tiktok') ttPost('pause');
  if(currentType === 'instagram') toast('Instagram embeds do not support remote pause controls.');

  pushStateFromLocal(true);
  document.getElementById('syncStateLabel').textContent = `${currentType.toUpperCase()} Paused`;
}

function seekBy(sec){
  if(!currentUrl){ toast('Load a video first.'); return; }

  const d = getDuration();
  const target = Math.max(0, Math.min(getCurrentTime() + sec, d || Number.MAX_SAFE_INTEGER));

  if(currentType === 'direct'){
    try { videoEl().currentTime = target; } catch(_) {}
  } else if(currentType === 'youtube'){
    if(ytPlayer && ytReady) ytPlayer.seekTo(target, true);
  } else if(currentType === 'tiktok'){
    ttPost('seekTo', target);
  } else if(currentType === 'instagram'){
    toast('Instagram embeds do not support seeking.');
  }

  currentState = { ...(currentState || {}), currentTime: target };
  pushRoomState({
    type: currentType,
    url: currentUrl,
    videoId: currentVideoId,
    socialKind: currentSocialKind,
    playing: isPlaying(),
    currentTime: target,
    volume: getVolume()
  }, true);
  syncUiFromPlayer();
}

function setLocalVolume(percent){
  const v = Math.max(0, Math.min(100, Number(percent)));

  if(currentType === 'direct'){
    videoEl().volume = v / 100;
  } else if(currentType === 'youtube'){
    if(ytPlayer && ytReady){
      ytPlayer.setVolume(v);
      if(v === 0) ytPlayer.mute(); else ytPlayer.unMute();
    }
  } else if(currentType === 'tiktok'){
    if(v === 0) ttPost('mute');
    else ttPost('unMute');
  } else if(currentType === 'instagram'){
    toast('Instagram embeds do not support volume control.');
  }

  pushStateFromLocal(true);
}

document.getElementById('seekBar').addEventListener('input', function(){
  localSeekDrag = true;
  const d = getDuration();
  if(!d) return;
  const target = (Number(this.value) / 1000) * d;
  document.getElementById('currentTimeLabel').textContent = fmt(target);
});
document.getElementById('seekBar').addEventListener('change', function(){
  const d = getDuration();
  if(!d){ localSeekDrag = false; return; }
  const target = (Number(this.value) / 1000) * d;

  if(currentType === 'direct'){
    try { videoEl().currentTime = target; } catch(_) {}
  } else if(currentType === 'youtube'){
    if(ytPlayer && ytReady) ytPlayer.seekTo(target, true);
  } else if(currentType === 'tiktok'){
    ttPost('seekTo', target);
  } else if(currentType === 'instagram'){
    toast('Instagram embeds do not support seeking.');
  }

  currentState = { ...(currentState || {}), currentTime: target };
  pushRoomState({
    type: currentType,
    url: currentUrl,
    videoId: currentVideoId,
    socialKind: currentSocialKind,
    playing: isPlaying(),
    currentTime: target,
    volume: getVolume()
  }, true);

  localSeekDrag = false;
});
document.getElementById('volumeBar').addEventListener('input', function(){
  setLocalVolume(this.value);
});

  document.getElementById('chatDrawer').classList.toggle('open');

  if(e.key === 'Enter') loadVideo();
});

document.getElementById('volumeBar').value = '100';

renderCaptionPanel();
