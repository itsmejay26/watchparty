<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WatchParty 🎬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #080810;
            --surface: #111120;
            --surface2: #1a1a2e;
            --border: rgba(255,255,255,0.07);
            --text: #e8e8f0;
            --muted: rgba(255,255,255,0.35);
            --accent: #5b8def;
            --accent2: #7c5ce8;
            --green: #4ade80;
            --red: #ef4444;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100dvh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        h1, h2 { font-family: 'Syne', sans-serif; }

        .screen { display: none; height: 100dvh; flex-direction: column; }
        .screen.active { display: flex; }

        /* ============================================================
           JOIN SCREEN
        ============================================================ */
        #joinScreen {
            background: radial-gradient(ellipse at 30% 10%, rgba(91,141,239,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(124,92,232,0.10) 0%, transparent 50%),
                        var(--bg);
            padding: 48px 24px 32px;
            align-items: center;
            overflow-y: auto;
            gap: 28px;
        }

        .brand { text-align: center; padding-top: 8px; }
        .brand-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(91,141,239,0.3);
        }
        .brand h1 {
            font-size: 26px; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand p { color: var(--muted); font-size: 13px; margin-top: 4px; }

        .join-block { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
        .block-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; padding-left: 2px; }

        .field {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 14px;
            padding: 14px 16px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 15px;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field:focus { border-color: rgba(91,141,239,0.5); box-shadow: 0 0 0 3px rgba(91,141,239,0.08); }
        .field::placeholder { color: rgba(255,255,255,0.2); }

        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .av-opt {
            aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
            background: var(--surface2); padding: 5px; overflow: hidden;
        }
        .av-opt img { width: 100%; height: 100%; border-radius: 50%; display: block; }
        .av-opt.sel { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,141,239,0.25); transform: scale(1.08); }

        .btn-primary {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none; border-radius: 14px; color: white;
            font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.18s;
            box-shadow: 0 6px 20px rgba(91,141,239,0.25); letter-spacing: 0.01em;
        }
        .btn-primary:active { transform: scale(0.97); }

        .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 11px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .join-row { display: flex; gap: 8px; }
        .join-row .field {
            flex: 1;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .btn-ghost {
            padding: 14px 18px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: all 0.18s;
        }
        .btn-ghost:active { transform: scale(0.97); }

        /* ============================================================
           ROOM SCREEN
        ============================================================ */
        #roomScreen { overflow: hidden; position: relative; }

        /* ── Video Area ── */
        .video-wrap {
            flex-shrink: 0; height: 42dvh; background: #000;
            position: relative; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }

        #mainVideo { width: 100%; height: 100%; object-fit: contain; display: block; }
        #ytFrame { width: 100%; height: 100%; border: none; display: block; }

        .video-empty {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; color: var(--muted); pointer-events: none;
        }
        .video-empty .big-icon { font-size: 36px; }
        .video-empty p { font-size: 12px; }

        .url-bar {
            position: absolute; top: 8px; left: 8px; right: 8px;
            display: flex; gap: 6px; z-index: 10;
        }
        .url-bar input {
            flex: 1; background: rgba(0,0,0,0.72);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
            padding: 9px 12px; color: #fff;
            font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none;
        }
        .url-bar input::placeholder { color: rgba(255,255,255,0.28); }
        .url-bar button {
            background: var(--accent); border: none; border-radius: 10px;
            padding: 9px 14px; color: #fff;
            font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
        }

        /* Fullscreen button */
        .fs-btn {
            position: absolute; bottom: 8px; right: 8px;
            width: 32px; height: 32px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; transition: all 0.18s;
        }
        .fs-btn:active { transform: scale(0.9); }

        .vid-progress-row {
            position: absolute; bottom: 8px; left: 8px; right: 46px;
            display: flex; align-items: center; gap: 8px; z-index: 10;
        }
        .prog-track {
            flex: 1; height: 3px; background: rgba(255,255,255,0.18);
            border-radius: 2px; cursor: pointer; position: relative;
        }
        .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; }
        .vid-time {
            font-size: 10px; color: rgba(255,255,255,0.45);
            white-space: nowrap; font-family: 'Space Mono', monospace;
            letter-spacing: 0.04em;
        }

        /* ── Info Bar ── */
        .info-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 16px;
            background: rgba(8,8,16,0.9);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .room-pill { display: flex; align-items: center; gap: 6px; }
        .room-pill .label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

        /* ── FIXED Room Code ── */
        .room-code-chip {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            color: #a8c4f8;
            letter-spacing: 0.22em;
            background: rgba(91,141,239,0.12);
            border: 1px solid rgba(91,141,239,0.25);
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            user-select: text;
            -webkit-user-select: text;
        }

        .watch-count { font-size: 11px; color: var(--muted); }
        .watch-count .dot {
            display: inline-block; width: 6px; height: 6px;
            background: var(--green); border-radius: 50%;
            margin-right: 4px; animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── Participants (Dynamic Sizing) ── */
        .participants-wrap {
            padding: 10px 14px 4px; flex-shrink: 0; background: var(--bg);
        }
        .participants-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
            align-items: flex-end;
        }
        .participants-scroll::-webkit-scrollbar { display: none; }

        .p-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; position: relative; flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .p-avatar-ring { position: relative; transition: all 0.3s; }
        .p-avatar-ring img {
            border-radius: 50%; border: 2px solid transparent;
            background: var(--surface2); transition: all 0.3s;
            display: block;
        }
        .p-avatar-ring img.is-me { border-color: var(--accent); }
        .p-avatar-ring img.is-speaking { border-color: var(--green); }

        .online-pip {
            position: absolute; bottom: 1px; right: 1px;
            width: 10px; height: 10px;
            background: var(--green); border-radius: 50%; border: 2px solid var(--bg);
        }

        .p-name {
            font-size: 9px; color: var(--muted);
            overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; text-align: center;
            transition: max-width 0.3s;
        }

        /* ── Chat Bubble above avatar ── */
        .chat-bubble {
            position: absolute; bottom: calc(100% + 8px);
            left: 50%; transform: translateX(-50%);
            background: rgba(26,26,46,0.97);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px 12px 12px 3px;
            padding: 6px 10px; font-size: 11px;
            white-space: nowrap; max-width: 150px;
            overflow: hidden; text-overflow: ellipsis;
            pointer-events: none;
            animation: bubblePop 0.28s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            color: var(--text);
        }
        .chat-bubble::after {
            content: ''; position: absolute;
            bottom: -7px; left: 14px;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-top: 7px solid rgba(26,26,46,0.97);
        }
        @keyframes bubblePop {
            from { opacity:0; transform:translateX(-50%) scale(0.8) translateY(6px); }
            to   { opacity:1; transform:translateX(-50%) scale(1) translateY(0); }
        }

        /* ── Typing Bubble ── */
        .typing-bubble {
            position: absolute; bottom: calc(100% + 8px);
            left: 50%; transform: translateX(-50%);
            background: rgba(26,26,46,0.97);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px 12px 12px 3px;
            padding: 7px 12px;
            pointer-events: none;
            animation: bubblePop 0.28s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 3px;
        }
        .typing-bubble::after {
            content: ''; position: absolute;
            bottom: -7px; left: 14px;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-top: 7px solid rgba(26,26,46,0.97);
        }
        .typing-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(255,255,255,0.5);
            animation: typingBounce 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%,60%,100% { transform: translateY(0); opacity:0.5; }
            30% { transform: translateY(-4px); opacity:1; }
        }

        /* ── Controls Bar ── */
        .controls-row {
            display: flex; justify-content: center; align-items: center;
            gap: 18px; padding: 10px 16px;
            background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0;
        }
        .ctrl {
            width: 46px; height: 46px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.18s; color: #fff;
        }
        .ctrl:active { transform: scale(0.88); }
        .ctrl.on { background: rgba(91,141,239,0.2); border: 1px solid rgba(91,141,239,0.3); color: var(--accent); }
        .ctrl.off { background: rgba(255,255,255,0.07); color: var(--red); }
        .ctrl.leave { background: var(--red); }

        /* ── Chat Drawer ── */
        .chat-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(13,13,22,0.98); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            border-radius: 22px 22px 0 0;
            transition: height 0.4s cubic-bezier(0.33,1,0.68,1);
            height: 56px; z-index: 50; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-drawer.open { height: 52dvh; }

        .drawer-handle {
            height: 56px; display: flex; align-items: center;
            padding: 0 16px; cursor: pointer; flex-shrink: 0; position: relative;
        }
        .handle-pill {
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
            width: 32px; height: 3px; background: rgba(255,255,255,0.18); border-radius: 2px;
        }
        .handle-label {
            flex: 1; font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.65); display: flex; align-items: center; gap: 6px;
        }
        .online-badge {
            font-size: 9px; background: rgba(91,141,239,0.2);
            border: 1px solid rgba(91,141,239,0.3); color: var(--accent);
            padding: 2px 7px; border-radius: 8px;
        }
        .handle-chevron { color: var(--muted); transition: transform 0.4s; }
        .chat-drawer.open .handle-chevron { transform: rotate(180deg); }

        .msgs-list {
            flex: 1; overflow-y: auto; padding: 8px 14px;
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .chat-drawer.open .msgs-list { opacity: 1; pointer-events: auto; }
        .msgs-list::-webkit-scrollbar { width: 3px; }
        .msgs-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

        .msg-row { display: flex; gap: 8px; align-items: flex-end; }
        .msg-row.me { flex-direction: row-reverse; }
        .msg-av { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); flex-shrink: 0; }
        .msg-body { display: flex; flex-direction: column; gap: 2px; max-width: 70%; }
        .msg-sender { font-size: 9px; color: var(--muted); padding: 0 4px; }
        .msg-row.me .msg-sender { text-align: right; }
        .msg-text {
            background: var(--surface2); padding: 9px 12px;
            border-radius: 14px 14px 14px 3px;
            font-size: 13px; line-height: 1.4; word-break: break-word; color: var(--text);
        }
        .msg-row.me .msg-text {
            background: var(--accent); border-radius: 14px 14px 3px 14px; color: #fff;
        }

        .chat-input-row {
            padding: 10px 14px; padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex; gap: 8px; align-items: center;
            border-top: 1px solid var(--border); flex-shrink: 0;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .chat-drawer.open .chat-input-row { opacity: 1; pointer-events: auto; }

        .chat-field {
            flex: 1; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 22px;
            padding: 10px 16px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
        }
        .chat-field::placeholder { color: rgba(255,255,255,0.2); }
        .chat-field:focus { border-color: rgba(91,141,239,0.35); }

        .send-btn {
            width: 36px; height: 36px; background: var(--accent); border: none;
            border-radius: 50%; color: #fff; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all 0.15s;
        }
        .send-btn:active { transform: scale(0.88); }

        /* ═══════════════════════════════════════════════════
           FULLSCREEN MODE
        ═══════════════════════════════════════════════════ */
        #roomScreen.fullscreen { background: #000; }
        #roomScreen.fullscreen .video-wrap {
            height: 100dvh !important; position: fixed; inset: 0; z-index: 200;
        }
        #roomScreen.fullscreen .info-bar,
        #roomScreen.fullscreen .participants-wrap,
        #roomScreen.fullscreen .controls-row { display: none; }
        #roomScreen.fullscreen .chat-drawer { z-index: 300; }

        /* Fullscreen overlay chat messages */
        .fs-overlay {
            display: none;
            position: fixed; bottom: 80px; left: 12px; right: 12px;
            z-index: 250; pointer-events: none;
            flex-direction: column; gap: 6px;
            max-height: 30dvh; overflow: hidden; justify-content: flex-end;
        }
        #roomScreen.fullscreen .fs-overlay { display: flex; }

        .fs-msg {
            background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 6px 12px;
            font-size: 12px; color: rgba(255,255,255,0.9);
            display: flex; gap: 6px; align-items: center;
            animation: fsSlideIn 0.25s ease;
            width: fit-content; max-width: 80%;
        }
        @keyframes fsSlideIn {
            from { opacity:0; transform: translateY(8px); }
            to   { opacity:1; transform: translateY(0); }
        }
        .fs-msg strong { color: var(--accent); font-size: 11px; }

        /* Fullscreen controls overlay */
        .fs-controls {
            display: none;
            position: fixed; bottom: 16px; left: 0; right: 0;
            z-index: 260; justify-content: center;
            gap: 16px; align-items: center;
        }
        #roomScreen.fullscreen .fs-controls { display: flex; }

        .fs-ctrl {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; transition: all 0.18s;
            backdrop-filter: blur(8px);
        }
        .fs-ctrl.on  { background: rgba(91,141,239,0.4);  border: 1px solid rgba(91,141,239,0.5); color: var(--accent); }
        .fs-ctrl.off { background: rgba(255,50,50,0.35);  border: 1px solid rgba(255,50,50,0.4);  color: var(--red); }
        .fs-ctrl.exit-fs { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
        .fs-ctrl:active { transform: scale(0.88); }

        /* Chat open button in fullscreen */
        .fs-chat-btn {
            position: fixed; bottom: 20px; right: 16px;
            z-index: 260; width: 44px; height: 44px;
            background: rgba(91,141,239,0.4); backdrop-filter: blur(8px);
            border: 1px solid rgba(91,141,239,0.5);
            border-radius: 50%; color: #fff; display: none;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.18s;
        }
        #roomScreen.fullscreen .fs-chat-btn { display: flex; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(26,26,46,0.95); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 12px; font-size: 13px;
            z-index: 999; pointer-events: none; opacity: 0;
            transition: opacity 0.25s, transform 0.25s; white-space: nowrap;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     JOIN SCREEN
════════════════════════════════════════════ -->
<div id="joinScreen" class="screen active">
    <div class="brand">
        <div class="brand-logo">🎬</div>
        <h1>WatchParty</h1>
        <p>Watch anything together, in sync.</p>
    </div>

    <div class="join-block">
        <div class="block-label">Your Name</div>
        <input id="nameInput" type="text" class="field" placeholder="Enter your display name…" maxlength="18" autocomplete="off">
    </div>

    <div class="join-block">
        <div class="block-label">Pick an Avatar</div>
        <div class="avatar-grid" id="avatarGrid"></div>
    </div>

    <div class="join-block">
        <button class="btn-primary" onclick="createRoom()">🚀 &nbsp;Create a Room</button>
        <div class="divider">or join with a code</div>
        <div class="join-row">
            <input id="roomCodeInput" type="text" class="field" placeholder="XXXXXX" maxlength="6" autocomplete="off">
            <button class="btn-ghost" onclick="joinRoom()">Join →</button>
        </div>
    </div>
</div>


<!-- ═══════════════════════════════════════════
     ROOM SCREEN
════════════════════════════════════════════ -->
<div id="roomScreen" class="screen">

    <!-- Video -->
    <div class="video-wrap" id="videoWrap">
        <div class="video-empty" id="videoEmpty">
            <div class="big-icon">📺</div>
            <p>Paste a video link above to start</p>
        </div>

        <video id="mainVideo" playsinline class="hidden"></video>
        <iframe id="ytFrame" class="hidden" allowfullscreen allow="autoplay; fullscreen"></iframe>

        <div class="url-bar">
            <input id="videoUrlInput" type="text" placeholder="Paste mp4 or YouTube URL…" autocomplete="off">
            <button onclick="loadVideo()">▶ Play</button>
        </div>

        <div class="vid-progress-row hidden" id="progressRow">
            <div class="prog-track" id="progTrack">
                <div class="prog-fill" id="progFill"></div>

<script>
/* ═══════════════════════════════════════════════════════
   FIREBASE CONFIG
═══════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDi2OIPujrL_bxTSgPX0jAj63OM2HksWVY",

    messagingSenderId: "452721204928",

    measurementId:     "G-QWW58P45Q0"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

const SEEDS = ['Felix','Lilly','Max','Sophie','Leo','Emma','Finn','Mia','Noah','Zara','Sam','Luna'];

const me = {
    id:     'u_' + Math.random().toString(36).slice(2, 9),
    name:   '', avatar: '', roomId: '', micOn: true, camOn: true,
};

let refs = {};
let isSyncing = false;
let syncInterval = null;
let typingTimer = null;
let isTyping = false;
let isFullscreen = false;

/* ═══════════════════════════════════════════════════════
   JOIN SCREEN
═══════════════════════════════════════════════════════ */
function buildAvatarGrid() {
    const grid = document.getElementById('avatarGrid');
    SEEDS.forEach((seed, i) => {
        const el = document.createElement('div');
        el.className = 'av-opt' + (i === 0 ? ' sel' : '');
        el.innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}" alt="${seed}">`;
        el.onclick = () => {
            document.querySelectorAll('.av-opt').forEach(a => a.classList.remove('sel'));
            el.classList.add('sel');
            me.avatar = seed;
        };
        grid.appendChild(el);
    });
    me.avatar = SEEDS[0];
}

function validateJoin() {
    me.name = document.getElementById('nameInput').value.trim();
    if (!me.name)   { toast('Enter your name first!'); return false; }
    if (!me.avatar) { toast('Pick an avatar!');        return false; }
    return true;
}

function mkRoomId() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }

async function createRoom() {
    if (!validateJoin()) return;
    me.roomId = mkRoomId();
    await enterRoom();
}

async function joinRoom() {
    if (!validateJoin()) return;
    const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
    if (!code || code.length < 4) { toast('Enter the room code!'); return; }
    const snap = await db.ref(`rooms/${code}`).once('value');
    if (!snap.exists()) { toast('Room not found. Check the code.'); return; }
    me.roomId = code;
    await enterRoom();
}

async function enterRoom() {
    refs.room     = db.ref(`rooms/${me.roomId}`);
    refs.video    = db.ref(`rooms/${me.roomId}/video`);
    refs.users    = db.ref(`rooms/${me.roomId}/users`);
    refs.messages = db.ref(`rooms/${me.roomId}/messages`);
    refs.typing   = db.ref(`rooms/${me.roomId}/typing`);
    refs.me       = refs.users.child(me.id);
    refs.meTyping = refs.typing.child(me.id);

    await refs.me.set({ name: me.name, avatar: me.avatar, joinedAt: firebase.database.ServerValue.TIMESTAMP });
    refs.me.onDisconnect().remove();
    refs.meTyping.onDisconnect().remove();

    document.getElementById('joinScreen').classList.remove('active');
    document.getElementById('roomScreen').classList.add('active');
    document.getElementById('roomCodeDisplay').textContent = me.roomId;

    listenUsers();
    listenVideo();
    listenMessages();
    listenTyping();
    startPeriodicSync();
}

/* ═══════════════════════════════════════════════════════
   PARTICIPANTS — Dynamic Discord-like sizing
═══════════════════════════════════════════════════════ */
let participants = {};

function getAvatarSize(count) {
    if (count <= 1) return 72;
    if (count === 2) return 64;
    if (count <= 4) return 56;
    if (count <= 6) return 48;
    if (count <= 9) return 40;
    return 34;
}

function listenUsers() {
    refs.users.on('value', snap => {
        participants = snap.val() || {};
        renderParts();
        const n = Object.keys(participants).length;
        document.getElementById('watchCount').textContent = n;
        document.getElementById('onlineBadge').textContent = `${n} online`;
    });
}

function renderParts() {
    const list = document.getElementById('partList');
    const count = Object.keys(participants).length;
    const size = getAvatarSize(count);
    const nameMaxWidth = size + 'px';

    // Preserve existing bubbles before clearing
    const existingBubbles = {};
    const existingTyping = {};
    list.querySelectorAll('.p-item').forEach(el => {
        const uid = el.id.replace('pi-', '');
        const b = el.querySelector('.chat-bubble');
        const t = el.querySelector('.typing-bubble');
        if (b) existingBubbles[uid] = b.cloneNode(true);
        if (t) existingTyping[uid] = true;
    });

    list.innerHTML = '';

    Object.entries(participants).forEach(([uid, u]) => {
        const isMe = uid === me.id;
        const div = document.createElement('div');
        div.className = 'p-item';
        div.id = `pi-${uid}`;
        div.style.minWidth = size + 'px';
        div.innerHTML = `
            <div class="p-avatar-ring" style="width:${size}px;height:${size}px;">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${u.avatar}"
                     style="width:${size}px;height:${size}px;"
                     class="${isMe ? 'is-me' : ''}" alt="${u.name}">
                <div class="online-pip" style="width:${Math.max(8,size*0.18)}px;height:${Math.max(8,size*0.18)}px;"></div>
            </div>
            <span class="p-name" style="max-width:${nameMaxWidth};">${isMe ? 'You' : esc(u.name)}</span>
        `;
        // Restore chat bubble if it was showing
        if (existingBubbles[uid]) div.appendChild(existingBubbles[uid]);
        if (existingTyping[uid]) {
            const tb = makeTypingBubble();
            div.appendChild(tb);
        }
        list.appendChild(div);
    });
}

/* ═══════════════════════════════════════════════════════
   TYPING INDICATOR
═══════════════════════════════════════════════════════ */
function makeTypingBubble() {
    const b = document.createElement('div');
    b.className = 'typing-bubble';
    b.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
    return b;
}

function listenTyping() {
    refs.typing.on('value', snap => {
        const typing = snap.val() || {};
        // Update all participant items
        Object.keys(participants).forEach(uid => {
            if (uid === me.id) return;
            const item = document.getElementById(`pi-${uid}`);
            if (!item) return;
            const existingTb = item.querySelector('.typing-bubble');
            const existingCb = item.querySelector('.chat-bubble');
            if (typing[uid] && !existingCb) {
                if (!existingTb) {
                    item.appendChild(makeTypingBubble());
                }
            } else {
                if (existingTb) existingTb.remove();
            }
        });
    });
}

function setTyping(active) {
    if (!refs.meTyping) return;
    if (active) {
        refs.meTyping.set(true);
    } else {
        refs.meTyping.remove();
    }
    isTyping = active;
}

document.addEventListener('DOMContentLoaded', () => {
    const chatField = document.getElementById('chatField');
    chatField.addEventListener('input', () => {
        if (!refs.meTyping) return;
        if (chatField.value.trim().length > 0) {
            if (!isTyping) setTyping(true);
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => setTyping(false), 3000);
        } else {
            clearTimeout(typingTimer);
            setTyping(false);
        }
    });
    chatField.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
});

/* ═══════════════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════════════ */
function listenMessages() {
    const since = Date.now();
    refs.messages.orderByChild('ts').startAt(since).on('child_added', snap => {
        const m = snap.val();
        appendMsg(m);
        if (m.uid !== me.id) {
            showBubble(m.uid, m.text);
        }
        // Also show in fullscreen overlay
        addFsMsg(m);
    });
}

function appendMsg(m) {
    const list = document.getElementById('msgsList');
    const isMe = m.uid === me.id;
    const row  = document.createElement('div');
    row.className = `msg-row${isMe ? ' me' : ''}`;
    row.innerHTML = `
        <img class="msg-av" src="https://api.dicebear.com/7.x/avataaars/svg?seed=${m.avatar}" alt="">
        <div class="msg-body">
            ${!isMe ? `<span class="msg-sender">${esc(m.name)}</span>` : ''}
            <div class="msg-text">${esc(m.text)}</div>
        </div>
    `;
    list.appendChild(row);
    list.scrollTop = list.scrollHeight;
}

function showBubble(uid, text) {
    const item = document.getElementById(`pi-${uid}`);
    if (!item) return;
    // Remove typing bubble first
    const tb = item.querySelector('.typing-bubble');
    if (tb) tb.remove();
    // Remove old chat bubble
    const old = item.querySelector('.chat-bubble');
    if (old) old.remove();

    const b = document.createElement('div');
    b.className = 'chat-bubble';
    b.textContent = text.length > 24 ? text.slice(0, 24) + '…' : text;
    item.appendChild(b);
    setTimeout(() => {
        b.style.transition = 'opacity 0.4s, transform 0.4s';
        b.style.opacity = '0';
        b.style.transform = 'translateX(-50%) translateY(-4px)';
        setTimeout(() => b.remove(), 400);
    }, 3500);
}

function addFsMsg(m) {
    const overlay = document.getElementById('fsOverlay');
    const el = document.createElement('div');
    el.className = 'fs-msg';
    el.innerHTML = `<strong>${esc(m.name)}:</strong> ${esc(m.text)}`;
    overlay.appendChild(el);
    // Keep max 4 messages visible
    while (overlay.children.length > 4) overlay.removeChild(overlay.firstChild);
    // Fade out after 5s
    setTimeout(() => {
        el.style.transition = 'opacity 0.5s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
    }, 5000);
}

async function sendMsg() {
    const f = document.getElementById('chatField');
    const text = f.value.trim();
    if (!text) return;
    f.value = '';
    clearTimeout(typingTimer);
    setTyping(false);
    await refs.messages.push({
        uid: me.id, name: me.name, avatar: me.avatar,
        text, ts: firebase.database.ServerValue.TIMESTAMP
    });
    showBubble(me.id, text);
}

/* ═══════════════════════════════════════════════════════
   VIDEO PLAYER — Improved Sync
═══════════════════════════════════════════════════════ */
function loadVideo() {
    const url = document.getElementById('videoUrlInput').value.trim();
    if (!url) return;
    refs.video.set({ url, playing: true, currentTime: 0, ts: Date.now(), by: me.id });
    setupPlayer(url, 0, true);
}

function setupPlayer(url, startTime = 0, autoplay = true) {
    const vid = document.getElementById('mainVideo');
    const yt  = document.getElementById('ytFrame');
    const emp = document.getElementById('videoEmpty');
    const pr  = document.getElementById('progressRow');

    emp.classList.add('hidden');

    const isYT = url.includes('youtube.com') || url.includes('youtu.be');

    if (isYT) {
        const id = ytId(url);
        const t = Math.floor(startTime || 0);
        yt.src = `https://www.youtube.com/embed/${id}?autoplay=1&controls=1&start=${t}`;
        vid.classList.add('hidden');
        yt.classList.remove('hidden');
        pr.classList.add('hidden');
        return;
    }

    yt.classList.add('hidden');
    vid.classList.remove('hidden');
    pr.classList.remove('hidden');

    // Remove old listeners to avoid stacking
    vid.onplay = null; vid.onpause = null; vid.onseeked = null; vid.ontimeupdate = null;

    if (vid.src !== url) {
        vid.src = url;
        vid.load();
    }

    vid.onloadedmetadata = () => {
        if (startTime > 1) vid.currentTime = startTime;
        if (autoplay) vid.play().catch(() => {});
    };

    vid.onplay  = () => { if (!isSyncing) refs.video.update({ playing: true,  currentTime: vid.currentTime, ts: Date.now(), by: me.id }); };
    vid.onpause = () => { if (!isSyncing) refs.video.update({ playing: false, currentTime: vid.currentTime, ts: Date.now(), by: me.id }); };
    vid.onseeked = () => { if (!isSyncing) refs.video.update({ currentTime: vid.currentTime, ts: Date.now(), by: me.id }); };
    vid.ontimeupdate = updateProgress;

    document.getElementById('progTrack').onclick = e => {
        const rect = document.getElementById('progTrack').getBoundingClientRect();
        const newTime = ((e.clientX - rect.left) / rect.width) * (vid.duration || 0);
        vid.currentTime = newTime;
    };
}

let currentVideoUrl = '';

function listenVideo() {
    refs.video.on('value', snap => {
        const d = snap.val();
        if (!d || !d.url) return;

        const inp = document.getElementById('videoUrlInput');
        if (inp.value !== d.url) inp.value = d.url;

        const vid = document.getElementById('mainVideo');
        const yt  = document.getElementById('ytFrame');
        const isYT = d.url.includes('youtube.com') || d.url.includes('youtu.be');

        // New video URL loaded
        if (d.url !== currentVideoUrl) {
            currentVideoUrl = d.url;
            setupPlayer(d.url, d.currentTime || 0, d.playing);
            return;
        }

        // Don't sync our own changes
        if (d.by === me.id) return;

        if (isYT) return; // YT iframe handles its own playback

        if (!vid.src) return;

        isSyncing = true;

        // Adjust for elapsed time since the update was written
        const elapsed = d.ts ? (Date.now() - d.ts) / 1000 : 0;
        const targetTime = (d.currentTime || 0) + (d.playing ? elapsed : 0);

        if (Math.abs(vid.currentTime - targetTime) > 2.5) {
            vid.currentTime = targetTime;
        }

        if (d.playing && vid.paused)  vid.play().catch(() => {});
        if (!d.playing && !vid.paused) vid.pause();

        setTimeout(() => { isSyncing = false; }, 600);
    });
}

// Periodic sync to catch drift
function startPeriodicSync() {
    if (syncInterval) clearInterval(syncInterval);
    syncInterval = setInterval(() => {
        const vid = document.getElementById('mainVideo');
        if (!vid || !vid.src || vid.paused || isSyncing) return;
        refs.video.once('value').then(snap => {
            const d = snap.val();
            if (!d || !d.playing || !d.ts) return;
            const elapsed = (Date.now() - d.ts) / 1000;
            const expected = d.currentTime + elapsed;
            if (Math.abs(vid.currentTime - expected) > 4) {
                isSyncing = true;
                vid.currentTime = expected;
                setTimeout(() => { isSyncing = false; }, 600);
            }
        });
    }, 8000);
}

function updateProgress() {
    const vid  = document.getElementById('mainVideo');
    const fill = document.getElementById('progFill');
    const time = document.getElementById('vidTime');
    if (!vid || !fill || !vid.duration) return;
    fill.style.width = (vid.currentTime / vid.duration * 100) + '%';
    if (time) time.textContent = `${fmt(vid.currentTime)} / ${fmt(vid.duration)}`;
}

function ytId(url) {
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?]+)/);
    return m ? m[1] : '';
}

function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}

/* ═══════════════════════════════════════════════════════
   FULLSCREEN
═══════════════════════════════════════════════════════ */
function toggleFullscreen() {
    isFullscreen = !isFullscreen;
    const rs = document.getElementById('roomScreen');
    rs.classList.toggle('fullscreen', isFullscreen);

    if (isFullscreen) {
        // Try to lock landscape on mobile
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
        // Native fullscreen API
        if (rs.requestFullscreen) rs.requestFullscreen().catch(() => {});
        else if (rs.webkitRequestFullscreen) rs.webkitRequestFullscreen();
    } else {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
        if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

// Sync fullscreen state if user exits via browser controls
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && isFullscreen) {
        isFullscreen = false;
        document.getElementById('roomScreen').classList.remove('fullscreen');
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    }
});
document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement && isFullscreen) {
        isFullscreen = false;
        document.getElementById('roomScreen').classList.remove('fullscreen');
    }
});

/* ═══════════════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════════════ */
const micOnSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>`;
const micOffSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
const camOnSVG  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>`;
const camOffSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16 2 6"/><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;

function toggleMic() {
    me.micOn = !me.micOn;
    ['micBtn','fsMicBtn'].forEach(id => {
        const b = document.getElementById(id);
        if (!b) return;
        b.className = `ctrl ${me.micOn ? 'on' : 'off'}`;
        if (id === 'fsMicBtn') b.className = `fs-ctrl ${me.micOn ? 'on' : 'off'}`;
        b.innerHTML = me.micOn ? micOnSVG : micOffSVG;
    });
}

function toggleCam() {
    me.camOn = !me.camOn;
    ['camBtn','fsCamBtn'].forEach(id => {
        const b = document.getElementById(id);
        if (!b) return;
        b.className = `ctrl ${me.camOn ? 'on' : 'off'}`;
        if (id === 'fsCamBtn') b.className = `fs-ctrl ${me.camOn ? 'on' : 'off'}`;
        b.innerHTML = me.camOn ? camOnSVG : camOffSVG;
    });
}

function leaveRoom() {
    if (refs.me) refs.me.remove();
    if (refs.meTyping) refs.meTyping.remove();
    clearInterval(syncInterval);
    Object.values(refs).forEach(r => r.off?.());
    refs = {};
    currentVideoUrl = '';
    isFullscreen = false;
    document.getElementById('roomScreen').classList.remove('fullscreen', 'active');
    document.getElementById('joinScreen').classList.add('active');
    document.getElementById('msgsList').innerHTML = '';
    document.getElementById('partList').innerHTML = '';
    document.getElementById('fsOverlay').innerHTML = '';
    const vid = document.getElementById('mainVideo');
    vid.src = ''; vid.onplay = null; vid.onpause = null;
    document.getElementById('ytFrame').src = '';
    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
}

function toggleChat() {
    document.getElementById('chatDrawer').classList.toggle('open');
    setTimeout(() => {
        const l = document.getElementById('msgsList');
        l.scrollTop = l.scrollHeight;
    }, 420);
}

function copyCode() {
    navigator.clipboard?.writeText(me.roomId).then(() => toast('Room code copied! 📋'));
}

function toast(msg, ms = 2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
}

function esc(t) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(t));
    return d.innerHTML;
}

buildAvatarGrid();
</script>
