<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WatchParty 🎬</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
  --bg:#080810; --surface:#111120; --surface2:#1a1a2e;
  --border:rgba(255,255,255,0.07); --text:#e8e8f0;
  --muted:rgba(255,255,255,0.35); --accent:#5b8def;
  --accent2:#7c5ce8; --green:#4ade80; --red:#ef4444;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100dvh;
  -webkit-user-select:none; user-select:none;
}
h1,h2 { font-family:'Syne',sans-serif; }

.screen { display:none; height:100dvh; flex-direction:column; overflow:hidden; }
.screen.active { display:flex; }

/* JOIN SCREEN */
#joinScreen {
  background:
    radial-gradient(ellipse at 30% 10%, rgba(91,141,239,.13) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(124,92,232,.10) 0%, transparent 50%),
    var(--bg);
  padding:48px 24px 32px; align-items:center;
  overflow-y:auto; gap:28px; overflow-x:hidden;
}
.brand { text-align:center; padding-top:8px; }
.brand-logo {
  width:56px; height:56px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:18px; display:flex; align-items:center; justify-content:center;
  font-size:26px; margin:0 auto 14px; box-shadow:0 8px 24px rgba(91,141,239,.3);
}
.brand h1 {
  font-size:26px; letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.5));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.brand p { color:var(--muted); font-size:13px; margin-top:4px; }
.join-block { width:100%; max-width:380px; display:flex; flex-direction:column; gap:10px; }
.block-label { font-size:10px; font-weight:600; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; padding-left:2px; }
.field {
  width:100%; background:rgba(255,255,255,.05);
  border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px;
  outline:none; transition:border-color .2s,box-shadow .2s;
}
.field:focus { border-color:rgba(91,141,239,.5); box-shadow:0 0 0 3px rgba(91,141,239,.08); }
.field::placeholder { color:rgba(255,255,255,.2); }
.avatar-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.av-opt {
  aspect-ratio:1; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:all .22s cubic-bezier(.34,1.56,.64,1);
  background:var(--surface2); padding:5px; overflow:hidden;
}
.av-opt img { width:100%; height:100%; border-radius:50%; display:block; }
.av-opt.sel { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,141,239,.25); transform:scale(1.08); }
.btn-primary {
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:14px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition:all .18s; box-shadow:0 6px 20px rgba(91,141,239,.25);
}
.btn-primary:active { transform:scale(.97); }
.divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.join-row { display:flex; gap:8px; }
.join-row .field {
  flex:1; font-family:'Space Mono',monospace;
  font-weight:700; font-size:16px; letter-spacing:.18em; text-transform:uppercase;
}
.btn-ghost {
  padding:14px 18px; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:14px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; white-space:nowrap; transition:all .18s;
}
.btn-ghost:active { transform:scale(.97); }

/* ROOM */
#roomScreen { position:relative; }

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; background:rgba(8,8,16,.96);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.room-pill { display:flex; align-items:center; gap:6px; }
.room-pill .label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.room-code-chip {
  font-family:'Space Mono',monospace;
  font-size:16px; font-weight:700;
  color:#c8daff; letter-spacing:.10em;
  background:rgba(91,141,239,.13);
  border:1px solid rgba(91,141,239,.28);
  padding:5px 14px; border-radius:8px;
  cursor:pointer; user-select:text; -webkit-user-select:text;
}
.status { font-size:11px; color:var(--muted); }
.status .dot {
  display:inline-block; width:6px; height:6px;
  background:var(--green); border-radius:50%; margin-right:4px;
  animation:blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

.video-wrap {
  flex-shrink:0; height:42dvh; background:#000;
  position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
#mainVideo {
  width:100%; height:100%;
  object-fit:contain;
  display:block;
  background:#000;
}
.video-empty {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  color:var(--muted); pointer-events:none;
}
.video-empty .big-icon { font-size:36px; }
.video-empty p { font-size:12px; }

.url-bar {
  position:absolute; top:8px; left:8px; right:8px;
  display:flex; gap:6px; z-index:10;
}
.url-bar input {
  flex:1; background:rgba(0,0,0,.75); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.13); border-radius:10px;
  padding:9px 12px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:12px; outline:none;
}
.url-bar input::placeholder { color:rgba(255,255,255,.3); }
.url-bar button {
  background:var(--accent); border:none; border-radius:10px;
  padding:9px 14px; color:#fff; font-family:'DM Sans',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;
}

.controls-panel {
  padding:14px 14px 12px;
  background:var(--bg);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.control-row {
  display:flex; align-items:center; gap:10px; width:100%;
}
.ctrl-btn {
  flex:1;
  height:46px;
  border-radius:14px;
  border:none;
  padding:0 12px;
  display:flex; align-items:center; justify-content:center;
  gap:6px; cursor:pointer; transition:all .16s;
  color:#fff; font-family:'DM Sans',sans-serif; font-weight:600;
  background:rgba(255,255,255,.07);
}
.ctrl-btn:active { transform:scale(.95); }
.ctrl-btn.play { background:rgba(74,222,128,.16); color:#89f0a8; }
.ctrl-btn.pause { background:rgba(239,68,68,.16); color:#ff9e9e; }
.ctrl-btn.seek { background:rgba(91,141,239,.16); color:#c8daff; }

.seek-wrap {
  display:flex; align-items:center; gap:10px; width:100%;
}
.seek-time {
  font-size:10px; color:rgba(255,255,255,.55); white-space:nowrap;
  font-family:'Space Mono',monospace;
}
.seekbar {
  width:100%; accent-color:var(--accent); height:4px;
}
.volume-wrap {
  display:flex; align-items:center; gap:10px; width:100%;
}
.volume-label {
  font-size:11px; color:var(--muted); min-width:42px;
}
.volume {
  width:100%; accent-color:var(--accent); height:4px;
}

.info-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 16px; background:rgba(8,8,16,.9);
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.watch-count { font-size:11px; color:var(--muted); }
.watch-count .dot {
  display:inline-block; width:6px; height:6px; background:var(--green);
  border-radius:50%; margin-right:4px; animation:blink 2s infinite;
}

.participants-wrap {
  flex-shrink:0; background:var(--bg);
  padding:16px 14px 6px; overflow:visible;
}
.participants-scroll {
  display:flex; gap:10px; align-items:flex-end;
  overflow-x:auto; overflow-y:visible;
  padding-bottom:4px;
}
.participants-scroll::-webkit-scrollbar { display:none; }

.p-item {
  display:flex; flex-direction:column; align-items:center;
  gap:4px; flex-shrink:0; position:relative;
}
.p-avatar-ring { position:relative; }
.p-avatar-ring img {
  border-radius:50%; border:2.5px solid transparent;
  background:var(--surface2); display:block;
}
.p-avatar-ring img.is-me { border-color:var(--accent); }
.online-pip {
  position:absolute; bottom:1px; right:1px;
  background:var(--green); border-radius:50%;
  border:2px solid var(--bg);
}
.p-name {
  font-size:9px; color:var(--muted);
  overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; text-align:center;
}

.chat-bubble {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px 12px 12px 3px;
  padding:6px 10px; font-size:11px; line-height:1.3;
  white-space:nowrap; max-width:160px;
  overflow:hidden; text-overflow:ellipsis;
  pointer-events:none; z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.55);
  color:var(--text);
  animation:bubPop .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
.chat-bubble::after {
  content:'';
  position:absolute;
  bottom:-7px; left:14px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid rgba(20,20,40,.97);
}
@keyframes bubPop {
  from { opacity:0; transform:translateX(-50%) scale(.8) translateY(6px); }
  to   { opacity:1; transform:translateX(-50%) scale(1)  translateY(0); }
}

.typing-bubble {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px 12px 12px 3px;
  padding:8px 12px;
  pointer-events:none; z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.55);
  display:flex; align-items:center; gap:4px;
  animation:bubPop .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
.typing-bubble::after {
  content:'';
  position:absolute;
  bottom:-7px; left:14px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid rgba(20,20,40,.97);
}
.tdot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,.6);
  animation:tdBounce 1.2s infinite ease-in-out;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdBounce {
  0%,60%,100%{transform:translateY(0);opacity:.5}
  30%{transform:translateY(-5px);opacity:1}
}

.controls-row {
  display:flex; justify-content:center; align-items:center;
  gap:12px; padding:10px 16px; background:var(--bg);
  border-top:1px solid var(--border); flex-shrink:0; flex-wrap:wrap;
}
.ctrl {
  width:46px; height:46px; border-radius:50%; border:none;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .18s; color:#fff;
}
.ctrl:active{transform:scale(.88)}
.ctrl.on    { background:rgba(91,141,239,.2); border:1px solid rgba(91,141,239,.3); color:var(--accent); }
.ctrl.off   { background:rgba(255,255,255,.07); color:var(--red); }
.ctrl.leave { background:var(--red); }

.chat-drawer {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(13,13,22,.98); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); border-radius:22px 22px 0 0;
  transition:height .4s cubic-bezier(.33,1,.68,1);
  height:56px; z-index:50; display:flex; flex-direction:column; overflow:hidden;
}
.chat-drawer.open { height:52dvh; }
.drawer-handle {
  height:56px; display:flex; align-items:center;
  padding:0 16px; cursor:pointer; flex-shrink:0; position:relative;
}
.handle-pill {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  width:32px; height:3px; background:rgba(255,255,255,.18); border-radius:2px;
}
.handle-label {
  flex:1; font-size:13px; font-weight:500;
  color:rgba(255,255,255,.65); display:flex; align-items:center; gap:6px;
}
.online-badge {
  font-size:9px; background:rgba(91,141,239,.2);
  border:1px solid rgba(91,141,239,.3); color:var(--accent);
  padding:2px 7px; border-radius:8px;
}
.handle-chevron { color:var(--muted); transition:transform .4s; }
.chat-drawer.open .handle-chevron { transform:rotate(180deg); }
.msgs-list {
  flex:1; overflow-y:auto; padding:8px 14px;
  display:flex; flex-direction:column; gap:10px;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.chat-drawer.open .msgs-list { opacity:1; pointer-events:auto; }
.msgs-list::-webkit-scrollbar{width:3px}
.msgs-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.msg-row { display:flex; gap:8px; align-items:flex-end; }
.msg-row.me { flex-direction:row-reverse; }
.msg-av { width:26px; height:26px; border-radius:50%; background:var(--surface2); flex-shrink:0; }
.msg-body { display:flex; flex-direction:column; gap:2px; max-width:70%; }
.msg-sender { font-size:9px; color:var(--muted); padding:0 4px; }
.msg-row.me .msg-sender { text-align:right; }
.msg-text {
  background:var(--surface2); padding:9px 12px;
  border-radius:14px 14px 14px 3px;
  font-size:13px; line-height:1.4; word-break:break-word; color:var(--text);
}
.msg-row.me .msg-text {
  background:var(--accent); border-radius:14px 14px 3px 14px; color:#fff;
}
.chat-input-row {
  padding:10px 14px; padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex; gap:8px; align-items:center;
  border-top:1px solid var(--border); flex-shrink:0;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.chat-drawer.open .chat-input-row { opacity:1; pointer-events:auto; }
.chat-field {
  flex:1; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:22px;
  padding:10px 16px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none;
}
.chat-field::placeholder { color:rgba(255,255,255,.2); }
.chat-field:focus { border-color:rgba(91,141,239,.35); }
.send-btn {
  width:36px; height:36px; background:var(--accent); border:none;
  border-radius:50%; color:#fff; display:flex;
  align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all .15s;
}
.send-btn:active{transform:scale(.88)}

.toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(26,26,46,.95); border:1px solid var(--border);
  padding:10px 18px; border-radius:12px; font-size:13px;
  z-index:9999; pointer-events:none; opacity:0;
  transition:opacity .25s,transform .25s; white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.hidden { display:none !important; }
</style>
</head>
<body>

<div id="joinScreen" class="screen active">
  <div class="brand">
    <div class="brand-logo">🎬</div>
    <h1>WatchParty</h1>
    <p>Watch anything together, in sync.</p>
  </div>

  <div class="join-block">
    <div class="block-label">Your Name</div>
    <input id="nameInput" type="text" class="field" placeholder="Enter your display name…" maxlength="18" autocomplete="off" />
  </div>

  <div class="join-block">
    <div class="block-label">Pick an Avatar</div>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>

  <div class="join-block">
    <button class="btn-primary" onclick="createRoom()">🚀 &nbsp;Create a Room</button>
    <div class="divider">or join with a code</div>
    <div class="join-row">
      <input id="roomCodeInput" type="text" class="field" placeholder="XXXXXX" maxlength="6" autocomplete="off" />
      <button class="btn-ghost" onclick="joinRoom()">Join →</button>
    </div>
  </div>
</div>

<div id="roomScreen" class="screen">
  <div class="topbar">
    <div class="room-pill">
      <span class="label">Room</span>
      <span class="room-code-chip" id="roomCodeDisplay" onclick="copyCode()">------</span>
    </div>
    <div class="status"><span class="dot"></span><span id="watchCount">1</span> online</div>
  </div>

  <div class="video-wrap">
    <div class="video-empty" id="videoEmpty">
      <div class="big-icon">📺</div>
      <p>Paste a direct video link below to start</p>
    </div>
    <video id="mainVideo" playsinline class="hidden"></video>

    <div class="url-bar">
      <input id="videoUrlInput" type="text" placeholder="Paste direct video URL here…" autocomplete="off" />
      <button onclick="loadVideo()">Play</button>
    </div>
  </div>

  <div class="controls-panel">
    <div class="control-row">
      <button class="ctrl-btn play" onclick="playVideo()">Play</button>
      <button class="ctrl-btn pause" onclick="pauseVideo()">Pause</button>
      <button class="ctrl-btn seek" onclick="seekBy(-10)">-10s</button>
      <button class="ctrl-btn seek" onclick="seekBy(10)">+10s</button>
    </div>

    <div class="seek-wrap">
      <span class="seek-time" id="currentTimeLabel">0:00</span>
      <input id="seekBar" class="seekbar" type="range" min="0" max="1000" value="0" />
      <span class="seek-time" id="durationLabel">0:00</span>
    </div>

    <div class="volume-wrap">
      <span class="volume-label">Volume</span>
      <input id="volumeBar" class="volume" type="range" min="0" max="100" value="100" />
    </div>
  </div>

  <div class="info-bar">
    <div class="room-pill">
      <span class="label">Live sync</span>
    </div>
    <div class="watch-count"><span class="dot"></span><span id="syncStateLabel">Ready</span></div>
  </div>

  <div class="participants-wrap">
    <div class="participants-scroll" id="partList"></div>
  </div>

  <div class="controls-row">
    <button id="micBtn" class="ctrl on" onclick="toggleMic()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    </button>
    <button id="camBtn" class="ctrl on" onclick="toggleCam()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
    </button>
    <button class="ctrl leave" onclick="leaveRoom()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
    </button>
  </div>

  <div class="chat-drawer" id="chatDrawer">
    <div class="drawer-handle" onclick="toggleChat()">
      <div class="handle-pill"></div>
      <span class="handle-label">Group Chat <span class="online-badge" id="onlineBadge">0 online</span></span>
      <svg class="handle-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </div>
    <div class="msgs-list" id="msgsList"></div>
    <div class="chat-input-row">
      <input id="chatField" type="text" class="chat-field" placeholder="Say something…" maxlength="200" autocomplete="off" />
      <button class="send-btn" onclick="sendMsg()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({

function avatarSz(n){
  if(n<=1)  return 72;
  if(n===2) return 64;
  if(n<=4)  return 56;
  if(n<=6)  return 48;
  if(n<=9)  return 40;
  return 34;
}

/* VIDEO SYNC */
function isYouTube(url){ return /youtube\.com|youtu\.be/.test(url); }

function setVideoSource(url, startAt = 0, autoplay = false){
  const v = videoEl();
  const empty = document.getElementById('videoEmpty');

  if(isYouTube(url)){
    toast('Use a direct video link. YouTube does not work with the shared video element.');
    return false;
  }

  empty.classList.add('hidden');
  v.classList.remove('hidden');

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }

  if(/\.m3u8(\?|#|$)/i.test(url) && window.Hls && Hls.isSupported()){
    hlsInstance = new Hls({
      enableWorker:true,
      lowLatencyMode:true
    });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
  } else {
    if(v.src !== url){
      v.src = url;
      v.load();
    }
  }

  currentUrl = url;

  v.onloadedmetadata = () => {
    try {
      if(isFinite(startAt) && startAt > 0) v.currentTime = Math.max(0, startAt);
    } catch(_) {}
    updateUiFromVideo();
    if(autoplay) v.play().catch(()=>{});
  };

  return true;
}

function currentRemoteTime(state){
  if(!state) return 0;
  const base = Number(state.currentTime || 0);
  if(!state.playing) return base;
  const ts = Number(state.updatedAt || 0);
  if(!ts) return base;
  return base + ((Date.now() - ts) / 1000);
}

function broadcastPlayer(patch){
  if(!refs.player) return;
  const now = Date.now();
  if(now - lastBroadcastAt < 120 && !patch.force) return;
  lastBroadcastAt = now;

  const payload = {
    ...patch,
    by: me.id,
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  };
  delete payload.force;
  refs.player.update(payload);
}

function loadVideo(){
  const url = document.getElementById('videoUrlInput').value.trim();
  if(!url){ toast('Paste a video link first.'); return; }

  const v = videoEl();
  v.volume = Number(document.getElementById('volumeBar').value) / 100;

  if(!setVideoSource(url, 0, true)) return;

  broadcastPlayer({
    url,
    playing: true,
    currentTime: 0,
    volume: v.volume,
    force: true
  });

  document.getElementById('syncStateLabel').textContent = 'Playing';
}

function playVideo(){
  const v = videoEl();
  if(!v.src && !currentUrl){
    toast('Load a video first.');
    return;
  }
  v.play().catch(()=>{});
  broadcastPlayer({
    playing: true,
    currentTime: v.currentTime || 0,
    volume: v.volume,
    force: true
  });
  document.getElementById('syncStateLabel').textContent = 'Playing';
}

function pauseVideo(){
  const v = videoEl();
  if(!v.src && !currentUrl){
    toast('Load a video first.');
    return;
  }
  v.pause();
  broadcastPlayer({
    playing: false,
    currentTime: v.currentTime || 0,
    volume: v.volume,
    force: true
  });
  document.getElementById('syncStateLabel').textContent = 'Paused';
}

function seekBy(sec){
  const v = videoEl();
  if(!v.src){ toast('Load a video first.'); return; }
  const dur = (v.duration && isFinite(v.duration)) ? v.duration : Number.MAX_SAFE_INTEGER;
  const next = Math.max(0, Math.min((v.currentTime || 0) + sec, dur));
  try { v.currentTime = next; } catch(_) {}
  broadcastPlayer({
    currentTime: next,
    playing: !v.paused,
    volume: v.volume,
    force: true
  });
}

function updateUiFromVideo(){
  const v = videoEl();
  const seek = document.getElementById('seekBar');
  const cur = document.getElementById('currentTimeLabel');
  const dur = document.getElementById('durationLabel');

  if(v.duration && isFinite(v.duration) && v.duration > 0){
    seek.value = String(Math.round((v.currentTime / v.duration) * 1000));
    cur.textContent = fmt(v.currentTime);
    dur.textContent = fmt(v.duration);
  } else {
    seek.value = '0';
    cur.textContent = '0:00';
    dur.textContent = '0:00';
  }

  document.getElementById('volumeBar').value = String(Math.round((v.volume ?? 1) * 100));
}

function bindLocalVideo(){
  const v = videoEl();
  const seek = document.getElementById('seekBar');
  const vol = document.getElementById('volumeBar');

  v.addEventListener('loadedmetadata', updateUiFromVideo);
  v.addEventListener('durationchange', updateUiFromVideo);
  v.addEventListener('timeupdate', ()=> {
    if(!localSeekDrag) updateUiFromVideo();
  });
  v.addEventListener('volumechange', updateUiFromVideo);

  v.addEventListener('play', ()=> {
    if(isApplyingRemote) return;
    broadcastPlayer({
      playing: true,
      currentTime: v.currentTime || 0,
      volume: v.volume,
      force: true
    });
    document.getElementById('syncStateLabel').textContent = 'Playing';
  });

  v.addEventListener('pause', ()=> {
    if(isApplyingRemote) return;
    broadcastPlayer({
      playing: false,
      currentTime: v.currentTime || 0,
      volume: v.volume,
      force: true
    });
    document.getElementById('syncStateLabel').textContent = 'Paused';
  });

  v.addEventListener('seeked', ()=> {
    if(isApplyingRemote) return;
    if(!v.src) return;
    broadcastPlayer({
      currentTime: v.currentTime,
      playing: !v.paused,
      volume: v.volume,
      force: true
    });
  });

  seek.addEventListener('input', ()=> {
    localSeekDrag = true;
    const d = v.duration && isFinite(v.duration) ? v.duration : 0;
    const t = d ? (Number(seek.value) / 1000) * d : 0;
    document.getElementById('currentTimeLabel').textContent = fmt(t);
  });

  seek.addEventListener('change', ()=> {
    const d = v.duration && isFinite(v.duration) ? v.duration : 0;
    if(!d){
      localSeekDrag = false;
      return;
    }
    const target = (Number(seek.value) / 1000) * d;
    try { v.currentTime = target; } catch(_) {}
    broadcastPlayer({
      currentTime: target,
      playing: !v.paused,
      volume: v.volume,
      force: true
    });
    localSeekDrag = false;
  });

  vol.addEventListener('input', ()=> {
    v.volume = Math.max(0, Math.min(1, Number(vol.value) / 100));
    broadcastPlayer({
      volume: v.volume,
      currentTime: v.currentTime || 0,
      playing: !v.paused,
      force: true
    });
  });
}

function applyRemotePlayerState(state){
  const v = videoEl();
  if(!state) return;

  currentPlayerState = state;

  if(state.url && state.url !== currentUrl){
    setVideoSource(state.url, 0, false);
  }

  if(typeof state.volume === 'number' && isFinite(state.volume)){
    v.volume = Math.max(0, Math.min(1, state.volume));
  }

  const targetTime = currentRemoteTime(state);

  if(state.url){
    if(state.playing){
      if(v.paused) v.play().catch(()=>{});
      if(isFinite(targetTime) && Math.abs(v.currentTime - targetTime) > 0.75){
        try { v.currentTime = Math.max(0, targetTime); } catch(_) {}
      }
    } else {
      if(!v.paused) v.pause();
      if(isFinite(state.currentTime) && Math.abs(v.currentTime - state.currentTime) > 0.75){
        try { v.currentTime = Math.max(0, Number(state.currentTime || 0)); } catch(_) {}
      }
    }
  }

  updateUiFromVideo();
}

function listenPlayer(){
  refs.player.on('value', snap=>{
    const state = snap.val();
    if(!state || !state.url){
      document.getElementById('syncStateLabel').textContent = 'Ready';
      return;
    }

    if(!stateReady){
      stateReady = true;
      currentPlayerState = state;
      document.getElementById('syncStateLabel').textContent = state.playing ? 'Playing' : 'Paused';
      setVideoSource(state.url, currentRemoteTime(state), !!state.playing);
      applyRemotePlayerState(state);
      return;
    }

    if(state.by === me.id){
      currentPlayerState = state;
      document.getElementById('syncStateLabel').textContent = state.playing ? 'Playing' : 'Paused';
      return;
    }

    isApplyingRemote = true;
    document.getElementById('syncStateLabel').textContent = state.playing ? 'Playing' : 'Paused';
    applyRemotePlayerState(state);
    setTimeout(()=>{ isApplyingRemote = false; }, 250);
  });
}

function startSyncLoop(){
  clearInterval(syncTimer);
  syncTimer = setInterval(()=>{
    const v = videoEl();
    if(!v.src || v.paused || isApplyingRemote || !currentPlayerState || !currentPlayerState.playing) return;

    const expected = currentRemoteTime(currentPlayerState);
    if(Math.abs(v.currentTime - expected) > 2.0){
      isApplyingRemote = true;
      try { v.currentTime = Math.max(0, expected); } catch(_) {}
      setTimeout(()=>{ isApplyingRemote = false; }, 200);
    }
  }, 2000);
}
