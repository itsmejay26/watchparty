<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WatchParty 🎬</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
  --bg:#080810; --surface:#111120; --surface2:#1a1a2e;
  --border:rgba(255,255,255,0.07); --text:#e8e8f0;
  --muted:rgba(255,255,255,0.35); --accent:#5b8def;
  --accent2:#7c5ce8; --green:#4ade80; --red:#ef4444;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100dvh;
  -webkit-user-select:none; user-select:none;
}
h1,h2 { font-family:'Syne',sans-serif; }

.screen { display:none; height:100dvh; flex-direction:column; overflow:hidden; }
.screen.active { display:flex; }

/* JOIN SCREEN */
#joinScreen {
  background:
    radial-gradient(ellipse at 30% 10%, rgba(91,141,239,.13) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(124,92,232,.10) 0%, transparent 50%),
    var(--bg);
  padding:48px 24px 32px; align-items:center;
  overflow-y:auto; gap:28px; overflow-x:hidden;
}
.brand { text-align:center; padding-top:8px; }
.brand-logo {
  width:56px; height:56px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:18px; display:flex; align-items:center; justify-content:center;
  font-size:26px; margin:0 auto 14px; box-shadow:0 8px 24px rgba(91,141,239,.3);
}
.brand h1 {
  font-size:26px; letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.5));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.brand p { color:var(--muted); font-size:13px; margin-top:4px; }
.join-block { width:100%; max-width:380px; display:flex; flex-direction:column; gap:10px; }
.block-label { font-size:10px; font-weight:600; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; padding-left:2px; }
.field {
  width:100%; background:rgba(255,255,255,.05);
  border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px;
  outline:none; transition:border-color .2s,box-shadow .2s;
}
.field:focus { border-color:rgba(91,141,239,.5); box-shadow:0 0 0 3px rgba(91,141,239,.08); }
.field::placeholder { color:rgba(255,255,255,.2); }
.avatar-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.av-opt {
  aspect-ratio:1; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:all .22s cubic-bezier(.34,1.56,.64,1);
  background:var(--surface2); padding:5px; overflow:hidden;
}
.av-opt img { width:100%; height:100%; border-radius:50%; display:block; }
.av-opt.sel { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,141,239,.25); transform:scale(1.08); }
.btn-primary {
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:14px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition:all .18s; box-shadow:0 6px 20px rgba(91,141,239,.25);
}
.btn-primary:active { transform:scale(.97); }
.divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.join-row { display:flex; gap:8px; }
.join-row .field {
  flex:1; font-family:'Space Mono',monospace;
  font-weight:700; font-size:16px; letter-spacing:.18em; text-transform:uppercase;
}
.btn-ghost {
  padding:14px 18px; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:14px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; white-space:nowrap; transition:all .18s;
}
.btn-ghost:active { transform:scale(.97); }

/* ROOM */
#roomScreen { position:relative; }

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; background:rgba(8,8,16,.96);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.room-pill { display:flex; align-items:center; gap:6px; }
.room-pill .label { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.room-code-chip {
  font-family:'Space Mono',monospace;
  font-size:16px; font-weight:700;
  color:#c8daff; letter-spacing:.10em;
  background:rgba(91,141,239,.13);
  border:1px solid rgba(91,141,239,.28);
  padding:5px 14px; border-radius:8px;
  cursor:pointer; user-select:text; -webkit-user-select:text;
}
.status { font-size:11px; color:var(--muted); }
.status .dot {
  display:inline-block; width:6px; height:6px;
  background:var(--green); border-radius:50%; margin-right:4px;
  animation:blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

.video-wrap {
  flex-shrink:0; height:42dvh; background:#000;
  position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
#mainVideo, #ytMount, #ttFrame {
  width:100%; height:100%;
  border:none; display:block;
}
#mainVideo {
  object-fit:contain;
  background:#000;
}
.video-empty {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; color:var(--muted); pointer-events:none; z-index:2;
}
.video-empty .big-icon { font-size:36px; }
.video-empty p { font-size:12px; }

.url-bar {
  position:absolute; top:8px; left:8px; right:8px;
  display:flex; gap:6px; z-index:10;
}
.url-bar input {
  flex:1; background:rgba(0,0,0,.75); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.13); border-radius:10px;
  padding:9px 12px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:12px; outline:none;
}
.url-bar input::placeholder { color:rgba(255,255,255,.3); }
.url-bar button {
  background:var(--accent); border:none; border-radius:10px;
  padding:9px 14px; color:#fff; font-family:'DM Sans',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;
}

.controls-panel {
  padding:14px 14px 12px;
  background:var(--bg);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.control-row {
  display:flex; align-items:center; gap:10px; width:100%;
}
.ctrl-btn {
  flex:1;
  height:46px;
  border-radius:14px;
  border:none;
  padding:0 12px;
  display:flex; align-items:center; justify-content:center;
  gap:6px; cursor:pointer; transition:all .16s;
  color:#fff; font-family:'DM Sans',sans-serif; font-weight:600;
  background:rgba(255,255,255,.07);
}
.ctrl-btn:active { transform:scale(.95); }
.ctrl-btn.play { background:rgba(74,222,128,.16); color:#89f0a8; }
.ctrl-btn.pause { background:rgba(239,68,68,.16); color:#ff9e9e; }
.ctrl-btn.seek { background:rgba(91,141,239,.16); color:#c8daff; }

.seek-wrap, .volume-wrap {
  display:flex; align-items:center; gap:10px; width:100%;
}
.seek-time {
  font-size:10px; color:rgba(255,255,255,.55); white-space:nowrap;
  font-family:'Space Mono',monospace;
}
.seekbar, .volume {
  width:100%; accent-color:var(--accent); height:4px;
}
.volume-label {
  font-size:11px; color:var(--muted); min-width:42px;
}

.info-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 16px; background:rgba(8,8,16,.9);
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.watch-count { font-size:11px; color:var(--muted); }
.watch-count .dot {
  display:inline-block; width:6px; height:6px; background:var(--green);
  border-radius:50%; margin-right:4px; animation:blink 2s infinite;
}

.participants-wrap {
  flex-shrink:0; background:var(--bg);
  padding:16px 14px 6px; overflow:visible;
}
.participants-scroll {
  display:flex; gap:10px; align-items:flex-end;
  overflow-x:auto; overflow-y:visible;
  padding-bottom:4px;
}
.participants-scroll::-webkit-scrollbar { display:none; }

.p-item {
  display:flex; flex-direction:column; align-items:center;
  gap:4px; flex-shrink:0; position:relative;
}
.p-avatar-ring { position:relative; }
.p-avatar-ring img {
  border-radius:50%; border:2.5px solid transparent;
  background:var(--surface2); display:block;
}
.p-avatar-ring img.is-me { border-color:var(--accent); }
.online-pip {
  position:absolute; bottom:1px; right:1px;
  background:var(--green); border-radius:50%;
  border:2px solid var(--bg);
}
.p-name {
  font-size:9px; color:var(--muted);
  overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; text-align:center;
}

.chat-bubble {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px 12px 12px 3px;
  padding:6px 10px; font-size:11px; line-height:1.3;
  white-space:nowrap; max-width:160px;
  overflow:hidden; text-overflow:ellipsis;
  pointer-events:none; z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.55);
  color:var(--text);
  animation:bubPop .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
.chat-bubble::after {
  content:'';
  position:absolute;
  bottom:-7px; left:14px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid rgba(20,20,40,.97);
}
@keyframes bubPop {
  from { opacity:0; transform:translateX(-50%) scale(.8) translateY(6px); }
  to   { opacity:1; transform:translateX(-50%) scale(1)  translateY(0); }
}

.typing-bubble {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.97);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px 12px 12px 3px;
  padding:8px 12px;
  pointer-events:none; z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.55);
  display:flex; align-items:center; gap:4px;
  animation:bubPop .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
.typing-bubble::after {
  content:'';
  position:absolute;
  bottom:-7px; left:14px;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid rgba(20,20,40,.97);
}
.tdot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,.6);
  animation:tdBounce 1.2s infinite ease-in-out;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdBounce {
  0%,60%,100%{transform:translateY(0);opacity:.5}
  30%{transform:translateY(-5px);opacity:1}
}

.controls-row {
  display:flex; justify-content:center; align-items:center;
  gap:12px; padding:10px 16px; background:var(--bg);
  border-top:1px solid var(--border); flex-shrink:0; flex-wrap:wrap;
}
.ctrl {
  width:46px; height:46px; border-radius:50%; border:none;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .18s; color:#fff;
}
.ctrl:active{transform:scale(.88)}
.ctrl.on    { background:rgba(91,141,239,.2); border:1px solid rgba(91,141,239,.3); color:var(--accent); }
.ctrl.off   { background:rgba(255,255,255,.07); color:var(--red); }
.ctrl.leave { background:var(--red); }

.chat-drawer {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(13,13,22,.98); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); border-radius:22px 22px 0 0;
  transition:height .4s cubic-bezier(.33,1,.68,1);
  height:56px; z-index:50; display:flex; flex-direction:column; overflow:hidden;
}
.chat-drawer.open { height:52dvh; }
.drawer-handle {
  height:56px; display:flex; align-items:center;
  padding:0 16px; cursor:pointer; flex-shrink:0; position:relative;
}
.handle-pill {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  width:32px; height:3px; background:rgba(255,255,255,.18); border-radius:2px;
}
.handle-label {
  flex:1; font-size:13px; font-weight:500;
  color:rgba(255,255,255,.65); display:flex; align-items:center; gap:6px;
}
.online-badge {
  font-size:9px; background:rgba(91,141,239,.2);
  border:1px solid rgba(91,141,239,.3); color:var(--accent);
  padding:2px 7px; border-radius:8px;
}
.handle-chevron { color:var(--muted); transition:transform .4s; }
.chat-drawer.open .handle-chevron { transform:rotate(180deg); }
.msgs-list {
  flex:1; overflow-y:auto; padding:8px 14px;
  display:flex; flex-direction:column; gap:10px;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.chat-drawer.open .msgs-list { opacity:1; pointer-events:auto; }
.msgs-list::-webkit-scrollbar{width:3px}
.msgs-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.msg-row { display:flex; gap:8px; align-items:flex-end; }
.msg-row.me { flex-direction:row-reverse; }
.msg-av { width:26px; height:26px; border-radius:50%; background:var(--surface2); flex-shrink:0; }
.msg-body { display:flex; flex-direction:column; gap:2px; max-width:70%; }
.msg-sender { font-size:9px; color:var(--muted); padding:0 4px; }
.msg-row.me .msg-sender { text-align:right; }
.msg-text {
  background:var(--surface2); padding:9px 12px;
  border-radius:14px 14px 14px 3px;
  font-size:13px; line-height:1.4; word-break:break-word; color:var(--text);
}
.msg-row.me .msg-text {
  background:var(--accent); border-radius:14px 14px 3px 14px; color:#fff;
}
.chat-input-row {
  padding:10px 14px; padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex; gap:8px; align-items:center;
  border-top:1px solid var(--border); flex-shrink:0;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.chat-drawer.open .chat-input-row { opacity:1; pointer-events:auto; }
.chat-field {
  flex:1; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:22px;
  padding:10px 16px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none;
}
.chat-field::placeholder { color:rgba(255,255,255,.2); }
.chat-field:focus { border-color:rgba(91,141,239,.35); }
.send-btn {
  width:36px; height:36px; background:var(--accent); border:none;
  border-radius:50%; color:#fff; display:flex;
  align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all .15s;
}
.send-btn:active{transform:scale(.88)}

.toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(26,26,46,.95); border:1px solid var(--border);
  padding:10px 18px; border-radius:12px; font-size:13px;
  z-index:9999; pointer-events:none; opacity:0;
  transition:opacity .25s,transform .25s; white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.hidden { display:none !important; }
</style>
</head>
<body>

<div id="joinScreen" class="screen active">
  <div class="brand">
    <div class="brand-logo">🎬</div>
    <h1>WatchParty</h1>
    <p>Watch anything together, in sync.</p>
  </div>

  <div class="join-block">
    <div class="block-label">Your Name</div>
    <input id="nameInput" type="text" class="field" placeholder="Enter your display name…" maxlength="18" autocomplete="off" />
  </div>

  <div class="join-block">
    <div class="block-label">Pick an Avatar</div>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>

  <div class="join-block">
    <button class="btn-primary" onclick="createRoom()">🚀 &nbsp;Create a Room</button>
    <div class="divider">or join with a code</div>
    <div class="join-row">
      <input id="roomCodeInput" type="text" class="field" placeholder="XXXXXX" maxlength="6" autocomplete="off" />
      <button class="btn-ghost" onclick="joinRoom()">Join →</button>
    </div>
  </div>
</div>

<div id="roomScreen" class="screen">
  <div class="topbar">
    <div class="room-pill">
      <span class="label">Room</span>
      <span class="room-code-chip" id="roomCodeDisplay" onclick="copyCode()">------</span>
    </div>
    <div class="status"><span class="dot"></span><span id="watchCount">1</span> online</div>
  </div>

  <div class="video-wrap" id="videoWrap">
    <div class="video-empty" id="videoEmpty">
      <div class="big-icon">📺</div>
      <p>Paste a video link below to start</p>
    </div>

    <video id="mainVideo" playsinline class="hidden"></video>
    <div id="ytMount" class="hidden"></div>
    <iframe id="ttFrame" class="hidden" allowfullscreen allow="autoplay; fullscreen"></iframe>

    <div class="url-bar">
      <input id="videoUrlInput" type="text" placeholder="Paste YouTube, TikTok, MP4, or M3U8 link…" autocomplete="off" />
      <button onclick="loadVideo()">Load</button>
    </div>
  </div>

  <div class="controls-panel">
    <div class="control-row">
      <button class="ctrl-btn play" onclick="playVideo()">Play</button>
      <button class="ctrl-btn pause" onclick="pauseVideo()">Pause</button>
      <button class="ctrl-btn seek" onclick="seekBy(-10)">-10s</button>
      <button class="ctrl-btn seek" onclick="seekBy(10)">+10s</button>
    </div>

    <div class="seek-wrap">
      <span class="seek-time" id="currentTimeLabel">0:00</span>
      <input id="seekBar" class="seekbar" type="range" min="0" max="1000" value="0" />
      <span class="seek-time" id="durationLabel">0:00</span>
    </div>

    <div class="volume-wrap">
      <span class="volume-label">Volume</span>
      <input id="volumeBar" class="volume" type="range" min="0" max="100" value="100" />
    </div>
  </div>

  <div class="info-bar">
    <div class="room-pill">
      <span class="label">Live sync</span>
    </div>
    <div class="watch-count"><span class="dot"></span><span id="syncStateLabel">Ready</span></div>
  </div>

  <div class="participants-wrap">
    <div class="participants-scroll" id="partList"></div>
  </div>

  <div class="controls-row">
    <button id="micBtn" class="ctrl on" onclick="toggleMic()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    </button>
    <button id="camBtn" class="ctrl on" onclick="toggleCam()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
    </button>
    <button class="ctrl leave" onclick="leaveRoom()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
    </button>
  </div>

  <div class="chat-drawer" id="chatDrawer">
    <div class="drawer-handle" onclick="toggleChat()">
      <div class="handle-pill"></div>
      <span class="handle-label">Group Chat <span class="online-badge" id="onlineBadge">0 online</span></span>
      <svg class="handle-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </div>
    <div class="msgs-list" id="msgsList"></div>
    <div class="chat-input-row">
      <input id="chatField" type="text" class="chat-field" placeholder="Say something…" maxlength="200" autocomplete="off" />
      <button class="send-btn" onclick="sendMsg()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({

function esc(t){
  const d=document.createElement('div');
  d.appendChild(document.createTextNode(t));
  return d.innerHTML;
}
function toast(msg, ms=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove('show'), ms);
}
function fmt(s){
  if(!isFinite(s) || s < 0) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function videoEl(){ return document.getElementById('mainVideo'); }

function setVisiblePlayer(type){
  const v = document.getElementById('mainVideo');
  const y = document.getElementById('ytMount');
  const t = document.getElementById('ttFrame');

  v.classList.add('hidden');
  y.classList.add('hidden');
  t.classList.add('hidden');

  if(type === 'direct') v.classList.remove('hidden');
  if(type === 'youtube') y.classList.remove('hidden');
  if(type === 'tiktok') t.classList.remove('hidden');

  document.getElementById('videoEmpty').classList.toggle('hidden', type !== 'none');
}

function parseVideoInput(raw){
  const url = raw.trim();
  if(!/^https?:\/\//i.test(url)) return null;

  const ytId = extractYouTubeId(url);
  if(ytId) return { type:'youtube', url, videoId:ytId, startAt:extractYouTubeStart(url) || 0 };

  const ttId = extractTikTokId(url);
  if(ttId) return { type:'tiktok', url, videoId:ttId, startAt:0 };

  return { type:'direct', url, videoId:'', startAt:0 };
}

function extractYouTubeId(url){
  const patterns = [
    /youtu\.be\/([A-Za-z0-9_-]{11})/i,
    /youtube\.com\/watch\?v=([A-Za-z0-9_-]{11})/i,
    /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/i,
    /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/i
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m) return m[1];
  }
  return '';
}
function extractYouTubeStart(url){
  const m = url.match(/[?&]t=(\d+)/i);
  return m ? Number(m[1]) : 0;
}
function extractTikTokId(url){
  const m1 = url.match(/tiktok\.com\/@[^/]+\/video\/(\d+)/i);
  if(m1) return m1[1];
  const m2 = url.match(/tiktok\.com\/player\/v1\/(\d+)/i);
  if(m2) return m2[1];
  return '';
}

function getDuration(){
  if(currentType === 'direct'){
    const v = videoEl();
    return v.duration && isFinite(v.duration) ? v.duration : 0;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    const d = ytPlayer.getDuration?.();
    return isFinite(d) ? d : 0;
  }
  if(currentType === 'tiktok'){
    return isFinite(ttDuration) ? ttDuration : 0;
  }
  return 0;
}
function getCurrentTime(){
  if(currentType === 'direct'){
    return videoEl().currentTime || 0;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    return ytPlayer.getCurrentTime?.() || 0;
  }
  if(currentType === 'tiktok'){
    return ttCurrentTime || 0;
  }
  return 0;
}
function isPlaying(){
  if(currentType === 'direct'){
    return !videoEl().paused;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    return ytPlayer.getPlayerState?.() === YT.PlayerState.PLAYING;
  }
  if(currentType === 'tiktok'){
    return currentState?.playing === true;
  }
  return false;
}
function getVolume(){
  if(currentType === 'direct'){
    return videoEl().volume ?? 1;
  }
  if(currentType === 'youtube' && ytPlayer && ytReady){
    return (ytPlayer.getVolume?.() ?? 100) / 100;
  }
  if(currentType === 'tiktok'){
    return ttMuted ? 0 : (currentState?.volume ?? 1);
  }
  return 1;
}
function getLiveTargetTime(state){
  if(!state) return 0;
  const base = Number(state.currentTime || 0);
  if(!state.playing) return base;
  const ts = Number(state.updatedAt || 0);
  if(!ts) return base;
  return Math.max(0, base + ((Date.now() - ts) / 1000));
}

function pushRoomState(patch, force = false){
  if(!refs.player) return;
  const now = Date.now();
  if(!force && now - lastBroadcastAt < 120) return;
  lastBroadcastAt = now;

  const payload = {
    ...(currentState || {}),
    ...patch,
    by: me.id,
    updatedAt: now
  };
  refs.player.update(payload);
}

function syncUiFromPlayer(){
  const seek = document.getElementById('seekBar');
  const cur = document.getElementById('currentTimeLabel');
  const dur = document.getElementById('durationLabel');
  const d = getDuration();
  const c = getCurrentTime();

  if(d > 0){
    seek.value = String(Math.round((c / d) * 1000));
    cur.textContent = fmt(c);
    dur.textContent = fmt(d);
  } else {
    seek.value = '0';
    cur.textContent = fmt(c);
    dur.textContent = '0:00';
  }

  document.getElementById('volumeBar').value = String(Math.round(getVolume() * 100));
}

function ensureYouTubeApi(){
  if(window.YT?.Player) return Promise.resolve();
  if(ytApiPromise) return ytApiPromise;

  ytApiPromise = new Promise(resolve=>{
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = function(){
      if(typeof prev === 'function') prev();
      resolve();
    };
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  });

  return ytApiPromise;
}

function createOrResetYT(videoId, startAt = 0, autoplay = false){
  ensureYouTubeApi().then(()=>{
    setVisiblePlayer('youtube');
    document.getElementById('videoEmpty').classList.add('hidden');

    if(!ytPlayer){
      ytPlayer = new YT.Player('ytMount', {
        width:'100%',
        height:'100%',
        videoId,
        playerVars:{
          autoplay:0,
          controls:0,
          rel:0,
          modestbranding:1,
          playsinline:1,
          disablekb:1,
          iv_load_policy:3,
          origin:location.origin,
          enablejsapi:1
        },
        events:{
          onReady:()=>{
            ytReady = true;
            if(pendingYTApply){
              const s = pendingYTApply;
              pendingYTApply = null;
              applyYTState(s);
            }
            if(autoplay){
              ytPlayer.seekTo(startAt || 0, true);
              ytPlayer.playVideo();
            }
            syncUiFromPlayer();
          },
          onStateChange:(e)=>{
            if(isApplyingRemote) return;
            if(e.data === YT.PlayerState.PLAYING ||
               e.data === YT.PlayerState.PAUSED ||
               e.data === YT.PlayerState.ENDED){
              pushStateFromLocal(true);
            }
          }
        }
      });
      return;
    }

    if(ytReady){
      ytPlayer.loadVideoById({ videoId, startSeconds:startAt || 0 });
      if(!autoplay) ytPlayer.pauseVideo();
    } else {
      pendingYTApply = { videoId, startAt, autoplay };
    }
  });
}

function applyYTState(state){
  if(!ytPlayer || !ytReady){
    pendingYTApply = state;
    return;
  }

  const target = getLiveTargetTime(state);
  if(state.videoId && state.videoId !== currentVideoId){
    ytPlayer.loadVideoById({ videoId:state.videoId, startSeconds:target || 0 });
  } else {
    ytPlayer.seekTo(target || 0, true);
  }

  if(typeof state.volume === 'number'){
    const vol = Math.max(0, Math.min(100, Math.round(state.volume * 100)));
    ytPlayer.setVolume(vol);
    if(vol === 0) ytPlayer.mute(); else ytPlayer.unMute();
  }

  if(state.playing) ytPlayer.playVideo();
  else ytPlayer.pauseVideo();
}

function buildTikTokSrc(id, autoplay){
  return `https://www.tiktok.com/player/v1/${id}?controls=0&progress_bar=0&play_button=0&volume_control=0&fullscreen_button=0&timestamp=1&autoplay=${autoplay ? 1 : 0}&music_info=0&description=0`;
}
function loadTikTokFrame(id, autoplay = false){
  setVisiblePlayer('tiktok');
  document.getElementById('videoEmpty').classList.add('hidden');
  document.getElementById('ttFrame').src = buildTikTokSrc(id, autoplay);
}
function ttPost(type, value = null){
  const f = document.getElementById('ttFrame');
  if(!f?.contentWindow) return;
  f.contentWindow.postMessage({ type, value, 'x-tiktok-player': true }, '*');
}
function applyTikTokState(state){
  const target = getLiveTargetTime(state);
  if(state.videoId && state.videoId !== currentVideoId){
    loadTikTokFrame(state.videoId, state.playing);
  }

  if(state.playing) ttPost('play');
  else ttPost('pause');

  ttPost('seekTo', target || 0);

  if(state.volume != null){
    if(state.volume <= 0) ttPost('mute');
    else ttPost('unMute');
  }
}

window.addEventListener('message', (event) => {
  const d = event.data;
  if(!d || d['x-tiktok-player'] !== true) return;

  if(d.type === 'onPlayerReady'){
    ttCurrentTime = 0;
  }

  if(d.type === 'onStateChange'){
    if(isApplyingRemote) return;
    if(d.value === 1 || d.value === 2 || d.value === 0){
      pushStateFromLocal(true);
    }
  }

  if(d.type === 'onCurrentTime'){
    ttCurrentTime = Number(d.currentTime || 0);
    ttDuration = Number(d.duration || 0);
    syncUiFromPlayer();
  }

  if(d.type === 'onMute'){
    ttMuted = !!d.value;
    syncUiFromPlayer();
  }

  if(d.type === 'onVolumeChange'){
    if(Number(d.value) === 0) ttMuted = true;
    syncUiFromPlayer();
  }

  if(d.type === 'onPlayerError'){
    toast('TikTok player error.');
  }
});

function loadDirectVideo(url, startAt = 0, autoplay = false){
  const v = videoEl();
  setVisiblePlayer('direct');
  document.getElementById('videoEmpty').classList.add('hidden');

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }

  if(/\.m3u8(\?|#|$)/i.test(url) && window.Hls && Hls.isSupported()){
    hlsInstance = new Hls({ enableWorker:true, lowLatencyMode:true });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      try { if(isFinite(startAt) && startAt > 0) v.currentTime = Math.max(0, startAt); } catch(_) {}
      if(autoplay) v.play().catch(()=>{});
      syncUiFromPlayer();
    });
  } else {
    if(v.src !== url){
      v.src = url;
      v.load();
    }

    v.onloadedmetadata = () => {
      try { if(isFinite(startAt) && startAt > 0) v.currentTime = Math.max(0, startAt); } catch(_) {}
      if(autoplay) v.play().catch(()=>{});
      syncUiFromPlayer();
    };
  }
}

function validateJoin(){
  me.name = document.getElementById('nameInput').value.trim();
  if(!me.name){ toast('Enter your name first!'); return false; }
  return true;
}

async function createRoom(){
  if(!validateJoin()) return;
  me.roomId = Math.random().toString(36).slice(2,8).toUpperCase();
  await enterRoom();
}

async function joinRoom(){
  if(!validateJoin()) return;
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if(code.length < 4){ toast('Enter the room code!'); return; }
  const snap = await db.ref(`rooms/${code}`).once('value');
  if(!snap.exists()){ toast('Room not found. Check the code.'); return; }
  me.roomId = code;
  await enterRoom();
}

async function enterRoom(){
  refs.room = db.ref(`rooms/${me.roomId}`);
  refs.player = db.ref(`rooms/${me.roomId}/player`);
  refs.users = db.ref(`rooms/${me.roomId}/users`);
  refs.messages = db.ref(`rooms/${me.roomId}/messages`);
  refs.typing = db.ref(`rooms/${me.roomId}/typing`);
  refs.me = refs.users.child(me.id);
  refs.myTyping = refs.typing.child(me.id);

  await refs.me.set({
    name: me.name,
    avatar: me.avatar,
    joinedAt: Date.now()
  });
  refs.me.onDisconnect().remove();
  refs.myTyping.onDisconnect().remove();

  document.getElementById('joinScreen').classList.remove('active');
  document.getElementById('roomScreen').classList.add('active');
  document.getElementById('roomCodeDisplay').textContent = me.roomId;
  document.getElementById('syncStateLabel').textContent = 'Connected';
  document.getElementById('volumeBar').value = '100';

  listenUsers();
  listenMessages();
  listenTyping();
  listenPlayer();
  bindLocalVideo();
  startSyncLoop();
}

function leaveRoom(){
  closeChatIfOpen();
  refs.me?.remove();
  refs.myTyping?.remove();
  clearInterval(syncTimer);

  Object.values(refs).forEach(r => r?.off?.());
  refs = {};
  parts = {};
  currentState = null;
  currentType = 'none';
  currentUrl = '';
  currentVideoId = '';
  stateReady = false;
  isApplyingRemote = false;
  isTyping = false;
  localSeekDrag = false;
  ttDuration = 0;
  ttCurrentTime = 0;
  ttMuted = false;
  pendingTTApply = null;
  pendingYTApply = null;

  if(hlsInstance){ hlsInstance.destroy(); hlsInstance = null; }
  if(ytPlayer){
    try { ytPlayer.destroy(); } catch(_) {}
    ytPlayer = null;
    ytReady = false;
  }

  const v = videoEl();
  v.pause();
  v.removeAttribute('src');
  v.load();

  document.getElementById('ytMount').innerHTML = '';
  document.getElementById('ttFrame').src = '';

  document.getElementById('roomScreen').classList.remove('active');
  document.getElementById('joinScreen').classList.add('active');
  document.getElementById('msgsList').innerHTML = '';
  document.getElementById('partList').innerHTML = '';
  document.getElementById('roomCodeDisplay').textContent = '------';
  document.getElementById('watchCount').textContent = '1';
  document.getElementById('onlineBadge').textContent = '0 online';
  document.getElementById('syncStateLabel').textContent = 'Ready';
  document.getElementById('videoUrlInput').value = '';
  document.getElementById('seekBar').value = '0';
  document.getElementById('currentTimeLabel').textContent = '0:00';
  document.getElementById('durationLabel').textContent = '0:00';
  document.getElementById('videoEmpty').classList.remove('hidden');
  setVisiblePlayer('none');
}

function avatarSz(n){
  if(n<=1)  return 72;
  if(n===2) return 64;
  if(n<=4)  return 56;
  if(n<=6)  return 48;
  if(n<=9)  return 40;
  return 34;
}

    document.getElementById('watchCount').textContent = String(n);
    document.getElementById('onlineBadge').textContent = `${n} online`;
  });

function renderParts(){
  const list = document.getElementById('partList');
  const n = Object.keys(parts).length;
  const sz = avatarSz(n);
  const pip = Math.max(8, Math.round(sz * 0.17));

  const savedBubble = {};
  const savedTyping = {};

  list.querySelectorAll('.p-item').forEach(el=>{
    const uid = el.id.replace('pi-','');
    const cb = el.querySelector('.chat-bubble');
    const tb = el.querySelector('.typing-bubble');
    if(cb) savedBubble[uid] = cb.cloneNode(true);
    if(tb) savedTyping[uid] = true;
  });

  list.innerHTML = '';

  Object.entries(parts).forEach(([uid,u])=>{
    const isMe = uid === me.id;
    const div = document.createElement('div');
    div.className = 'p-item';
    div.id = `pi-${uid}`;
    div.style.minWidth = sz + 'px';

    div.innerHTML = `
      <div class="p-avatar-ring" style="width:${sz}px;height:${sz}px">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${u.avatar}"
             style="width:${sz}px;height:${sz}px"
             class="${isMe?'is-me':''}" alt="${u.name}">
        <div class="online-pip" style="width:${pip}px;height:${pip}px"></div>
      </div>
      <span class="p-name" style="max-width:${sz}px">${isMe ? 'You' : esc(u.name)}</span>`;

    if(savedBubble[uid]) div.appendChild(savedBubble[uid]);
    if(savedTyping[uid]) div.appendChild(mkTypingBubble());
    list.appendChild(div);
  });
}

function mkTypingBubble(){
  const b = document.createElement('div');
  b.className = 'typing-bubble';
  b.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  return b;
}

function listenTyping(){
  refs.typing.on('value', snap=>{
    const typing = snap.val() || {};
    Object.keys(parts).forEach(uid=>{
      if(uid === me.id) return;
      const item = document.getElementById(`pi-${uid}`);
      if(!item) return;
      const hasCB = !!item.querySelector('.chat-bubble');
      const hasTB = !!item.querySelector('.typing-bubble');
      if(typing[uid] && !hasCB){
        if(!hasTB) item.appendChild(mkTypingBubble());
      } else if(!typing[uid] && hasTB){
        item.querySelector('.typing-bubble')?.remove();
      }
    });
  });
}

function setTyping(on){
  if(!refs.myTyping) return;
  if(on) refs.myTyping.set(true);
  else refs.myTyping.remove();
  isTyping = on;
}

/* CHAT */
function listenMessages(){
  const since = Date.now();
  refs.messages.orderByChild('ts').startAt(since).on('child_added', snap=>{
    const m = snap.val();
    if(!m) return;
    appendMsg(m, 'msgsList');

function appendMsg(m, listId){
  const list = document.getElementById(listId);
  if(!list) return;

  const isMe = m.uid === me.id;
  const row = document.createElement('div');
  row.className = `msg-row${isMe ? ' me' : ''}`;
  row.innerHTML = `
    <img class="msg-av" src="https://api.dicebear.com/7.x/avataaars/svg?seed=${m.avatar}" alt="">
    <div class="msg-body">
      ${!isMe ? `<span class="msg-sender">${esc(m.name)}</span>` : ''}
      <div class="msg-text">${esc(m.text)}</div>
    </div>`;
  list.appendChild(row);
  list.scrollTop = list.scrollHeight;
}

function showBubble(uid, text){
  const item = document.getElementById(`pi-${uid}`);
  if(!item) return;

  item.querySelector('.typing-bubble')?.remove();
  item.querySelector('.chat-bubble')?.remove();

  const b = document.createElement('div');
  b.className = 'chat-bubble';
  b.textContent = text.length > 26 ? text.slice(0,26)+'…' : text;
  item.appendChild(b);

  setTimeout(()=>{
    b.style.transition = 'opacity .35s, transform .35s';
    b.style.opacity = '0';
    b.style.transform = 'translateX(-50%) translateY(-4px)';
    setTimeout(()=>b.remove(), 350);
  }, 3500);
}

async function sendMsg(){
  const f = document.getElementById('chatField');
  const text = f.value.trim();
  if(!text) return;
  f.value = '';
  clearTimeout(typingTimer);
  setTyping(false);
  await refs.messages.push({
    uid: me.id,
    name: me.name,
    avatar: me.avatar,
    text,
    ts: Date.now()
  });
  showBubble(me.id, text);
}

document.getElementById('chatField').addEventListener('input', function(){
  if(!refs.myTyping) return;
  if(this.value.trim().length > 0){
    if(!isTyping) setTyping(true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>setTyping(false), 3000);
  } else {
    clearTimeout(typingTimer);
    setTyping(false);
  }
});
document.getElementById('chatField').addEventListener('keypress', e=>{ if(e.key==='Enter') sendMsg(); });

/* PLAYER STATE */
function loadStateIntoUI(state){
  if(!state || !state.type) return;

  currentType = state.type;
  currentUrl = state.url || '';
  currentVideoId = state.videoId || '';
  currentState = state;

  document.getElementById('videoUrlInput').value = state.url || '';
  document.getElementById('syncStateLabel').textContent = `${state.type.toUpperCase()} ${state.playing ? 'Playing' : 'Paused'}`;

  if(state.type === 'direct'){
    setVisiblePlayer('direct');
    if(state.url !== videoEl().src){
      loadDirectVideo(state.url, getLiveTargetTime(state), !!state.playing);
    } else {
      const v = videoEl();
      if(typeof state.volume === 'number') v.volume = Math.max(0, Math.min(1, state.volume));
      const target = getLiveTargetTime(state);
      if(Math.abs((v.currentTime || 0) - target) > 0.75){
        try { v.currentTime = target; } catch(_) {}
      }
      if(state.playing && v.paused) v.play().catch(()=>{});
      if(!state.playing && !v.paused) v.pause();
      syncUiFromPlayer();
    }
  }

  if(state.type === 'youtube'){
    if(!ytPlayer || !ytReady || currentVideoId !== state.videoId){
      createOrResetYT(state.videoId, getLiveTargetTime(state), !!state.playing);
      pendingYTApply = state;
    } else {
      applyYTState(state);
    }
    setVisiblePlayer('youtube');
    syncUiFromPlayer();
  }

  if(state.type === 'tiktok'){
    if(currentVideoId !== state.videoId){
      loadTikTokFrame(state.videoId, !!state.playing);
      pendingTTApply = state;
    } else {
      applyTikTokState(state);
    }
    setVisiblePlayer('tiktok');
    syncUiFromPlayer();
  }
}

function listenPlayer(){
  refs.player.on('value', snap=>{
    const state = snap.val();
    if(!state || !state.type){
      document.getElementById('syncStateLabel').textContent = 'Ready';
      return;
    }

    if(!stateReady){
      stateReady = true;
      currentState = state;
      loadStateIntoUI(state);
      return;
    }

    if(state.by === me.id && state.type === currentType){
      currentState = state;
      syncUiFromPlayer();
      return;
    }

    isApplyingRemote = true;
    currentState = state;
    loadStateIntoUI(state);
    setTimeout(()=>{ isApplyingRemote = false; }, 250);
  });
}

function pushStateFromLocal(force = false){
  if(!refs.player) return;
  const patch = {
    type: currentType,
    url: currentUrl,
    videoId: currentVideoId,
    playing: isPlaying(),
    currentTime: getCurrentTime(),
    volume: getVolume()
  };
  pushRoomState(patch, force);
  currentState = { ...(currentState || {}), ...patch };
}

function startSyncLoop(){
  clearInterval(syncTimer);
  syncTimer = setInterval(()=>{
    if(!currentState) return;
    syncUiFromPlayer();

    const expected = getLiveTargetTime(currentState);
    const d = getDuration();
    if(currentState.playing && d > 0){
      if(currentType === 'direct'){
        const v = videoEl();
        if(v.src && !v.paused && Math.abs((v.currentTime || 0) - expected) > 2.0){
          isApplyingRemote = true;
          try { v.currentTime = expected; } catch(_) {}
          setTimeout(()=>{ isApplyingRemote = false; }, 200);
        }
      }

      if(currentType === 'youtube' && ytPlayer && ytReady){
        const c = ytPlayer.getCurrentTime?.() || 0;
        if(Math.abs(c - expected) > 2.0) ytPlayer.seekTo(expected, true);
      }

      if(currentType === 'tiktok'){
        if(Math.abs(ttCurrentTime - expected) > 2.0){
          ttPost('seekTo', expected);
        }
      }
    }
  }, 800);
}

/* DIRECT VIDEO EVENTS */
const directVideo = document.getElementById('mainVideo');
directVideo.addEventListener('loadedmetadata', ()=>{ if(currentType==='direct') syncUiFromPlayer(); });
directVideo.addEventListener('durationchange', ()=>{ if(currentType==='direct') syncUiFromPlayer(); });
directVideo.addEventListener('timeupdate', ()=>{ if(currentType==='direct' && !localSeekDrag) syncUiFromPlayer(); });
directVideo.addEventListener('volumechange', ()=>{ if(currentType==='direct') syncUiFromPlayer(); });
directVideo.addEventListener('play', ()=>{ if(!isApplyingRemote && currentType==='direct') pushStateFromLocal(true); });
directVideo.addEventListener('pause', ()=>{ if(!isApplyingRemote && currentType==='direct') pushStateFromLocal(true); });
directVideo.addEventListener('seeked', ()=>{ if(!isApplyingRemote && currentType==='direct') pushStateFromLocal(true); });

/* CONTROLS */
function loadVideo(){
  const raw = document.getElementById('videoUrlInput').value.trim();
  if(!raw){ toast('Paste a video link first.'); return; }

  const parsed = parseVideoInput(raw);
  if(!parsed){ toast('Paste a valid link starting with https://'); return; }

  currentType = parsed.type;
  currentUrl = parsed.url;
  currentVideoId = parsed.videoId || '';

  document.getElementById('videoEmpty').classList.add('hidden');
  document.getElementById('syncStateLabel').textContent = `${parsed.type.toUpperCase()} Loading`;

  if(parsed.type === 'direct'){
    loadDirectVideo(parsed.url, 0, true);
  } else if(parsed.type === 'youtube'){
    createOrResetYT(parsed.videoId, parsed.startAt || 0, true);
  } else if(parsed.type === 'tiktok'){
    loadTikTokFrame(parsed.videoId, true);
  }

  currentState = {
    type: parsed.type,
    url: parsed.url,
    videoId: parsed.videoId || '',
    playing: true,
    currentTime: 0,
    volume: Number(document.getElementById('volumeBar').value) / 100,
    updatedAt: Date.now(),
    by: me.id
  };

  pushRoomState(currentState, true);
  syncUiFromPlayer();
}

function playVideo(){
  if(!currentUrl){ toast('Load a video first.'); return; }

  if(currentType === 'direct') videoEl().play().catch(()=>{});
  if(currentType === 'youtube' && ytPlayer && ytReady) ytPlayer.playVideo();
  if(currentType === 'tiktok') ttPost('play');

  pushStateFromLocal(true);
  document.getElementById('syncStateLabel').textContent = `${currentType.toUpperCase()} Playing`;
}

function pauseVideo(){
  if(!currentUrl){ toast('Load a video first.'); return; }

  if(currentType === 'direct') videoEl().pause();
  if(currentType === 'youtube' && ytPlayer && ytReady) ytPlayer.pauseVideo();
  if(currentType === 'tiktok') ttPost('pause');

  pushStateFromLocal(true);
  document.getElementById('syncStateLabel').textContent = `${currentType.toUpperCase()} Paused`;
}

function seekBy(sec){
  if(!currentUrl){ toast('Load a video first.'); return; }

  const d = getDuration();
  const target = Math.max(0, Math.min(getCurrentTime() + sec, d || Number.MAX_SAFE_INTEGER));

  if(currentType === 'direct'){
    try { videoEl().currentTime = target; } catch(_) {}
  } else if(currentType === 'youtube'){
    if(ytPlayer && ytReady) ytPlayer.seekTo(target, true);
  } else if(currentType === 'tiktok'){
    ttPost('seekTo', target);
  }

  currentState = { ...(currentState || {}), currentTime: target };
  pushRoomState({
    type: currentType,
    url: currentUrl,
    videoId: currentVideoId,
    playing: isPlaying(),
    currentTime: target,
    volume: getVolume()
  }, true);
  syncUiFromPlayer();
}

function setLocalVolume(percent){
  const v = Math.max(0, Math.min(100, Number(percent)));

  if(currentType === 'direct'){
    videoEl().volume = v / 100;
  } else if(currentType === 'youtube'){
    if(ytPlayer && ytReady){
      ytPlayer.setVolume(v);
      if(v === 0) ytPlayer.mute(); else ytPlayer.unMute();
    }
  } else if(currentType === 'tiktok'){
    if(v === 0) ttPost('mute');
    else ttPost('unMute');
  }

  pushStateFromLocal(true);
}

document.getElementById('seekBar').addEventListener('input', function(){
  localSeekDrag = true;
  const d = getDuration();
  if(!d) return;
  const target = (Number(this.value) / 1000) * d;
  document.getElementById('currentTimeLabel').textContent = fmt(target);
});
document.getElementById('seekBar').addEventListener('change', function(){
  const d = getDuration();
  if(!d){ localSeekDrag = false; return; }
  const target = (Number(this.value) / 1000) * d;

  if(currentType === 'direct'){
    try { videoEl().currentTime = target; } catch(_) {}
  } else if(currentType === 'youtube'){
    if(ytPlayer && ytReady) ytPlayer.seekTo(target, true);
  } else if(currentType === 'tiktok'){
    ttPost('seekTo', target);
  }

  currentState = { ...(currentState || {}), currentTime: target };
  pushRoomState({
    type: currentType,
    url: currentUrl,
    videoId: currentVideoId,
    playing: isPlaying(),
    currentTime: target,
    volume: getVolume()
  }, true);

  localSeekDrag = false;
});
document.getElementById('volumeBar').addEventListener('input', function(){
  setLocalVolume(this.value);
});

  me.micOn = !me.micOn;
  const b = document.getElementById('micBtn');

}
function toggleCam(){
  me.camOn = !me.camOn;
  const b = document.getElementById('camBtn');
  b.className = `ctrl ${me.camOn ? 'on' : 'off'}`;
  b.innerHTML = me.camOn

    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16 2 6"/><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;
}

function toggleChat(){
  document.getElementById('chatDrawer').classList.toggle('open');
  setTimeout(()=>{
    const l=document.getElementById('msgsList');
    l.scrollTop = l.scrollHeight;
  }, 420);
}
function closeChatIfOpen(){
  document.getElementById('chatDrawer').classList.remove('open');
}

document.getElementById('videoUrlInput').addEventListener('keypress', e=>{
  if(e.key === 'Enter') loadVideo();
});

document.getElementById('volumeBar').value = '100';
document.getElementById('seekBar').value = '0';
</script>
